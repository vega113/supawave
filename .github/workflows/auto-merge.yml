name: Auto-Merge

on:
  pull_request:
    branches: [ main ]
    types:
      - opened
      - reopened
      - ready_for_review

jobs:
  enable-auto-merge:
    name: Enable Auto-Merge
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    steps:
      - name: Enable squash auto-merge
        run: gh pr merge --auto --squash "$PR_URL" || true
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
