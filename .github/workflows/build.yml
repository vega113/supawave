name: Build

on:
  push:
    branches: [ main, master, 'release/**', 'hotfix/**' ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  release:
    types: [ published ]
  workflow_dispatch:

jobs:
  server-jdk17:
    name: Server Build (JDK 17)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'sbt'

      - name: Install sbt
        run: |
          echo "deb https://repo.scala-sbt.org/scalasbt/debian all main" | sudo tee /etc/apt/sources.list.d/sbt.list
          curl -sL "https://keyserver.ubuntu.com/pks/lookup?op=get&search=0x99E82A75642AC823" | sudo apt-key add -
          sudo apt-get update -qq
          sudo apt-get install -y -qq sbt

      - name: Validate canonical deployment assets
        run: |
          bash -n scripts/deployment/bootstrap-linux-host.sh
          bash -n deploy/caddy/deploy.sh
          WAVE_IMAGE=ghcr.io/example/wave:test \
          DEPLOY_ROOT=/tmp/supawave \
          WAVE_INTERNAL_PORT=9898 \
          CANONICAL_HOST=wave.example.test \
          ROOT_HOST=example.test \
          WWW_HOST=www.example.test \
          docker compose -f deploy/caddy/compose.yml config >/tmp/caddy-compose.out

      - name: Build PST and Wave (no tests)
        run: sbt --batch pst/assembly wave/compile

      - name: Smoke UI (server startup + probes)
        run: sbt --batch wave/smokeUi

      - name: Smoke Installed Dist
        run: sbt --batch wave/smokeInstalled

  server-jakarta:
    name: Jakarta Profile (Jetty 12, non-blocking)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'sbt'

      - name: Install sbt
        run: |
          echo "deb https://repo.scala-sbt.org/scalasbt/debian all main" | sudo tee /etc/apt/sources.list.d/sbt.list
          curl -sL "https://keyserver.ubuntu.com/pks/lookup?op=get&search=0x99E82A75642AC823" | sudo apt-key add -
          sudo apt-get update -qq
          sudo apt-get install -y -qq sbt

      - name: Compile Jakarta sources (PR-blocking)
        continue-on-error: ${{ github.event_name != 'pull_request' }}
        run: sbt --batch wave/compile "wave/jakartaTest:compile"

      - name: Run jakartaTest (PR-blocking)
        continue-on-error: ${{ github.event_name != 'pull_request' }}
        run: sbt --batch "wave/jakartaTest:test"

      - name: Run jakarta ITs (PR-blocking)
        continue-on-error: ${{ github.event_name != 'pull_request' }}
        run: sbt --batch "wave/jakartaIT:test"

      - name: Publish jakartaTest reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-jakarta
          path: |
            target/test-reports/jakartaTest/**
            target/reports/tests/jakartaTest/**

      - name: Publish jakarta IT reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-jakarta-it
          path: |
            target/test-reports/jakartaIT/**
            target/reports/tests/jakartaIT/**

      - name: Guard experimental flags for release (tags/releases/release branches)
        if: ${{ github.ref_type == 'tag' || (github.event_name == 'release' && github.event.action == 'published') || (github.ref_type == 'branch' && (startsWith(github.ref_name, 'release/') || startsWith(github.ref_name, 'hotfix/'))) }}
        run: |
          ./scripts/ci-guard-experimental-flags.sh

      - name: Publish test results (if any)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            **/target/test-reports/**/*
            **/target/reports/tests/**/*

  client-gwt:
    if: ${{ false }} # enable after Phase 4 (GWT modernization)
    name: Client (GWT) Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK toolchains
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'sbt'

      - name: SBT build (GWT)
        run: sbt --batch wave/compileGwt
