name: Build

on:
  push:
    branches: [ main, master, 'release/**', 'hotfix/**' ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  release:
    types: [ published ]
  workflow_dispatch:

jobs:
  sbt-build:
    name: Server Build (JDK 17)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'sbt'

      - name: Install sbt
        run: |
          sudo install -d -m 0755 /etc/apt/keyrings
          curl --fail --show-error --location --retry 5 \
            "https://keyserver.ubuntu.com/pks/lookup?op=get&search=0x2EE0EA64E40A89B84B2DF73499E82A75642AC823" \
            | sudo gpg --dearmor -o /etc/apt/keyrings/sbt-archive-keyring.gpg
          echo "deb [signed-by=/etc/apt/keyrings/sbt-archive-keyring.gpg] https://repo.scala-sbt.org/scalasbt/debian all main" \
            | sudo tee /etc/apt/sources.list.d/sbt.list > /dev/null
          sudo apt-get update -qq
          sudo apt-get install -y -qq sbt

      - name: Validate canonical deployment assets
        run: |
          bash -n scripts/deployment/bootstrap-linux-host.sh
          bash -n deploy/caddy/deploy.sh
          WAVE_IMAGE=ghcr.io/example/wave:test \
          DEPLOY_ROOT=/tmp/supawave \
          WAVE_INTERNAL_PORT=9898 \
          CANONICAL_HOST=wave.example.test \
          ROOT_HOST=example.test \
          WWW_HOST=www.example.test \
          RESEND_API_KEY=test-dummy \
          WAVE_EMAIL_FROM=test-dummy \
          docker compose -f deploy/caddy/compose.yml config >/tmp/caddy-compose.out

      - name: Compile PST and Wave
        run: sbt --batch pst/compile wave/compile

      - name: Stage distribution
        run: sbt --batch Universal/stage

      - name: Smoke Installed Dist
        continue-on-error: true
        timeout-minutes: 3
        run: sbt --batch smokeInstalled

      - name: Guard experimental flags for release (tags/releases/release branches)
        if: ${{ github.ref_type == 'tag' || (github.event_name == 'release' && github.event.action == 'published') || (github.ref_type == 'branch' && (startsWith(github.ref_name, 'release/') || startsWith(github.ref_name, 'hotfix/'))) }}
        run: |
          ./scripts/ci-guard-experimental-flags.sh

  jakarta-profile:
    name: "Jakarta Profile (Jetty 12, non-blocking)"
    runs-on: ubuntu-latest
    needs: [sbt-build]
    steps:
      - name: Pass-through
        run: echo "Covered by Server Build"
