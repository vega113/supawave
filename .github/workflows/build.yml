name: Build
run-name: >-
  ${{ github.event_name == 'pull_request' && format('Build PR #{0} @ {1}', github.event.pull_request.number, github.event.pull_request.head.sha) || github.event_name == 'push' && format('Build {0} @ {1}', github.ref_name, github.sha) || github.event_name == 'release' && format('Build release {0}', github.event.release.tag_name) || github.event_name == 'workflow_dispatch' && format('Build {0} @ {1}', github.ref_name, github.sha) || format('Build {0}', github.event_name) }}

on:
  push:
    branches: [ main, master, 'release/**', 'hotfix/**' ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  release:
    types: [ published ]
  workflow_dispatch:

jobs:
  sbt-build:
    name: Server Build (JDK 17)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Assemble changelog from fragments
        run: python3 scripts/assemble-changelog.py

      - name: Validate changelog
        run: python3 scripts/validate-changelog.py --fragments-dir wave/config/changelog.d --changelog wave/config/changelog.json

      - name: Advisory Jakarta wrong-edit guardrail
        continue-on-error: true
        run: |
          base_ref=""
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base_ref="${{ github.event.pull_request.base.sha }}"
          elif [ -n "${{ github.event.before || '' }}" ] \
            && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            base_ref="${{ github.event.before }}"
          else
            base_ref="origin/main"
          fi
          ./scripts/jakarta-wrong-edit-guard.sh --base-ref "$base_ref"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'sbt'

      - name: Set up sbt
        uses: sbt/setup-sbt@v1

      - name: Validate canonical deployment assets
        run: |
          bash -n scripts/deployment/bootstrap-linux-host.sh
          bash -n deploy/caddy/deploy.sh
          bash scripts/ci-validate-deploy-healthcheck.sh
          python3 -m unittest scripts.tests.test_doc_guardrails -v
          python3 -m unittest scripts.tests.test_deploy_sanity_gate -v
          python3 -m unittest scripts.tests.test_send_resend_email -v
          python3 -m unittest scripts.tests.test_deploy_overlap_safety -v
          python3 -m unittest scripts.tests.test_repair_corrupted_waves -v
          WAVE_IMAGE_BLUE=ghcr.io/example/wave:test \
          DEPLOY_ROOT=/tmp/supawave \
          CANONICAL_HOST=wave.example.test \
          ROOT_HOST=example.test \
          WWW_HOST=www.example.test \
          RESEND_API_KEY=test-dummy \
          WAVE_EMAIL_FROM=test-dummy \
          docker compose -f deploy/caddy/compose.yml config >/tmp/caddy-compose.out

      - name: Compile PST and Wave
        run: |
          for attempt in 1 2 3; do
            echo "Compile attempt $attempt/3"
            log_file="$(mktemp)"
            status=0
            sbt --batch pst/compile wave/compile >"$log_file" 2>&1 || status=$?
            cat "$log_file"
            if [ "$status" -eq 0 ]; then
              rm -f "$log_file"
              break
            fi
            if grep -Eqi '(unresolved dependency|error downloading|download failed|read timed out|connection reset|connection timed out|502 bad gateway|503 service unavailable|temporary failure|coursier.*resolution|failed to download|sslhandshakeexception|sockettimeoutexception)' "$log_file"; then
              rm -f "$log_file"
              if [ $attempt -lt 3 ]; then
                echo "Transient dependency/plugin resolution failure on attempt $attempt, retrying in 30s..."
                sleep 30
              else
                echo "All 3 compile attempts failed due to transient dependency/plugin resolution errors"
                exit "$status"
              fi
            else
              rm -f "$log_file"
              echo "Compile failed with a non-transient error; failing fast without retry"
              exit "$status"
            fi
          done

      - name: Run Unit Tests
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            echo "Pre-resolving Test-scoped dependencies (attempt $attempt/3)"
            if sbt --batch Test/update; then
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "Failed to resolve Test-scoped dependencies after 3 attempts"
              exit 1
            fi
            echo "Transient failure while resolving Test-scoped dependencies; retrying in 30s"
            sleep 30
          done
          sbt --batch test

      - name: GWT compilation check
        run: sbt --batch compileGwt

      - name: Stage distribution
        run: sbt --batch Universal/stage

      - name: Verify staged changelog asset
        run: |
          set -euo pipefail
          staged_changelog="target/universal/stage/config/changelog.json"
          if [ ! -f "$staged_changelog" ]; then
            echo "Staged config/changelog.json was not found after packaging"
            exit 1
          fi
          diff -u wave/config/changelog.json "$staged_changelog"

      - name: Smoke Installed Dist
        continue-on-error: true
        timeout-minutes: 3
        run: sbt --batch smokeInstalled

      - name: Startup smoke test
        timeout-minutes: 2
        run: |
          cd target/universal/stage
          PORT=9898
          # Wait until $PORT is demonstrably free (fail closed: tool errors
          # leave port_free=0 so we keep waiting rather than proceeding blind).
          for attempt in $(seq 1 15); do
            port_free=0
            if command -v ss >/dev/null 2>&1; then
              # Capture output and exit code separately; only trust a successful run.
              if ss_out="$(ss -tlnp "sport = :$PORT" 2>/dev/null)"; then
                if ! printf '%s\n' "$ss_out" | grep -q LISTEN; then
                  port_free=1
                fi
              fi
            elif command -v lsof >/dev/null 2>&1; then
              # lsof exit 0=listener found, 1=no listener, >1=error; only 1 is "free".
              lsof_exit=0
              lsof -iTCP:$PORT -sTCP:LISTEN -Pn >/dev/null 2>&1 || lsof_exit=$?
              if [ "$lsof_exit" -eq 1 ]; then
                port_free=1
              fi
            else
              # bash /dev/tcp: exit 0=connected (in use), 1=refused (free),
              # other=unsupported — treated as unknown (fail closed, port_free stays 0).
              # Use || to capture exit code safely under set -e.
              tcp_exit=0
              bash -c "exec 6<>/dev/tcp/127.0.0.1/$PORT" >/dev/null 2>&1 || tcp_exit=$?
              if [ "$tcp_exit" -eq 1 ]; then
                port_free=1
              fi
            fi
            if [ "$port_free" -eq 1 ]; then
              break
            fi
            echo "Port $PORT still in use, waiting... (attempt $attempt)"
            sleep 2
          done
          # If the port is still occupied after retries, force-kill the listener.
          # In this CI context the only occupant is the Wave process left by the
          # preceding smokeInstalled step (which may have timed out and had its
          # JVM SIGTERM'd by GitHub Actions but not yet fully exited).
          if [ "$port_free" -ne 1 ]; then
            echo "Port $PORT still in use after retries; force-killing CI leftover."
            if command -v ss >/dev/null 2>&1; then
              ss -tlnp "sport = :$PORT" 2>/dev/null \
                | grep -oP 'pid=\K[0-9]+' | xargs -r kill -9 2>/dev/null || true
            elif command -v fuser >/dev/null 2>&1; then
              fuser -k "$PORT/tcp" 2>/dev/null || true
            fi
            sleep 2
            if command -v ss >/dev/null 2>&1 \
                && ss -tlnp "sport = :$PORT" 2>/dev/null | grep -q LISTEN; then
              echo "Port $PORT is still in use after forced kill; aborting."
              exit 1
            fi
          fi
          SERVER_LOG=/tmp/wave-startup.log
          CURL_LOG=/tmp/wave-curl-probe.log
          : > "$CURL_LOG"
          ./bin/wave > "$SERVER_LOG" 2>&1 &
          SERVER_PID=$!
          cleanup() {
            kill "$SERVER_PID" 2>/dev/null || true
            wait "$SERVER_PID" 2>/dev/null || true
          }
          trap cleanup EXIT
          for i in $(seq 1 30); do
            STATUS_CODE="$(curl --connect-timeout 2 --max-time 4 -sS -o /dev/null -w '%{http_code}' "http://localhost:$PORT/healthz" 2>>"$CURL_LOG" || true)"
            if [ "$STATUS_CODE" = "200" ]; then
              echo "Server started successfully"
              exit 0
            fi
            if ! kill -0 "$SERVER_PID" 2>/dev/null; then
              echo "Server process exited before becoming healthy"
              tail -n 200 "$SERVER_LOG" || true
              exit 1
            fi
            sleep 2
          done
          echo "Server failed to start within 60 seconds"
          echo "--- Server log ---"
          tail -n 200 "$SERVER_LOG" || true
          echo "--- Curl probe log ---"
          cat "$CURL_LOG" 2>/dev/null || true
          exit 1

      - name: Guard experimental flags for release (tags/releases/release branches)
        if: ${{ github.ref_type == 'tag' || (github.event_name == 'release' && github.event.action == 'published') || (github.ref_type == 'branch' && (startsWith(github.ref_name, 'release/') || startsWith(github.ref_name, 'hotfix/'))) }}
        run: |
          ./scripts/ci-guard-experimental-flags.sh

  jakarta-profile:
    name: "Jakarta Profile (Jetty 12, non-blocking)"
    runs-on: ubuntu-latest
    needs: [sbt-build]
    steps:
      - name: Pass-through
        run: echo "Covered by Server Build"
