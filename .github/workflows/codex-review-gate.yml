name: Codex Review Gate

on:
  pull_request:
    branches: [ main ]
    types:
      - opened
      - reopened
      - synchronize
      - labeled
      - unlabeled
      - ready_for_review
  pull_request_review:
    types:
      - submitted
      - edited
      - dismissed
  issue_comment:
    types:
      - created
      - edited

jobs:
  codex-review-gate:
    name: Codex Review Gate
    if: >-
      ${{
        (github.event.pull_request != null || github.event.issue.pull_request != null) &&
        (
          github.event_name != 'issue_comment' ||
          (
            github.event.comment.user.login == github.repository_owner &&
            contains(github.event.comment.body, '/codex-review-gate')
          )
        )
      }}
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
      contents: read
    steps:
      - name: Evaluate review gate
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber =
              context.payload.pull_request?.number ??
              context.payload.issue?.number ??
              context.payload.review_thread?.pull_request?.number;

            const query = `
              query($owner: String!, $repo: String!, $number: Int!) {
                repository(owner: $owner, name: $repo) {
                  pullRequest(number: $number) {
                    isDraft
                    labels(first: 100) {
                      nodes { name }
                    }
                    commits(last: 1) {
                      nodes {
                        commit {
                          committedDate
                          statusCheckRollup {
                            contexts(first: 100) {
                              nodes {
                                __typename
                                ... on StatusContext {
                                  context
                                  state
                                }
                                ... on CheckRun {
                                  name
                                  conclusion
                                  status
                                }
                              }
                            }
                          }
                        }
                      }
                    }
                  }
                }
              }
            `;

            const result = await github.graphql(query, { owner, repo, number: prNumber });
            const pullRequest = result.repository.pullRequest;
            if (!pullRequest) {
              core.setFailed(`Pull request #${prNumber} not found`);
              return;
            }

            if (pullRequest.isDraft) {
              core.setFailed("Draft PRs cannot pass Codex Review Gate");
              return;
            }

            const labels = pullRequest.labels.nodes.map((label) => label.name);
            const latestCommit = pullRequest.commits.nodes[0]?.commit ?? null;
            const prUpdatedAt = Date.parse(context.payload.pull_request?.updated_at ?? "");
            const statusNodes =
              latestCommit?.statusCheckRollup?.contexts?.nodes ?? [];
            const codeRabbitPassed = statusNodes.some((node) => {
              if (node.__typename === "StatusContext") {
                return node.context === "CodeRabbit" && node.state === "SUCCESS";
              }
              if (node.__typename === "CheckRun") {
                return node.name === "CodeRabbit" && node.conclusion === "SUCCESS";
              }
              return false;
            });

            const approvedByReviewBot =
              labels.includes("codex-reviewed");

            if (approvedByReviewBot) {
              core.info("Review gate passed via `codex-reviewed` label");
              return;
            }

            const latestCommitAt = latestCommit ? Date.parse(latestCommit.committedDate) : NaN;
            const baselineAt = latestCommitAt;
            const commitAgeMs = Number.isNaN(baselineAt) ? Number.POSITIVE_INFINITY : Date.now() - baselineAt;
            const reviewGracePeriodMs = 5 * 60 * 1000;
            const codeRabbitApproved = labels.includes("coderabbitai-reviewed") || codeRabbitPassed;

            if (!codeRabbitApproved) {
              core.setFailed("Missing required review signal: `codex-reviewed`, `coderabbitai-reviewed`, or successful CodeRabbit status");
              return;
            }

            if (commitAgeMs < reviewGracePeriodMs) {
              const remainingMinutes = Math.ceil((reviewGracePeriodMs - commitAgeMs) / 60000);
              core.setFailed("CodeRabbit is green, but the PR is still inside the 5 minute Codex-review window (" + remainingMinutes + " minute(s) remaining)");
              return;
            }

            core.info("Review gate passed after the 5 minute Codex-review window using CodeRabbit");
