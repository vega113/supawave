name: Codex Review Gate
run-name: >-
  ${{ github.event_name == 'issue_comment' && format('Review Gate issue #{0}', github.event.issue.number) || github.event_name == 'pull_request_review' && format('Review Gate PR #{0}', github.event.pull_request.number) || github.event_name == 'pull_request' && format('Review Gate PR #{0}', github.event.pull_request.number) || github.event_name == 'schedule' && 'Review Gate scheduler' || format('Review Gate {0}', github.event_name) }}

on:
  pull_request:
    branches: [ main ]
    types:
      - opened
      - reopened
      - synchronize
      - labeled
      - unlabeled
      - ready_for_review
  pull_request_review:
    types:
      - submitted
      - edited
      - dismissed
  issue_comment:
    types:
      - created
      - edited

  schedule:
    - cron: "*/5 * * * *"

jobs:
  requeue-codex-review-gate:
    name: Requeue Codex Review Gate
    if: ${{ github.event_name == 'schedule' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Requeue eligible PR gates
        uses: actions/github-script@v7
        with:
          script: |
            const { shouldRequeueCodexReviewGate } = require(`${process.env.GITHUB_WORKSPACE}/.github/scripts/codex-review-gate`);
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const defaultBranchResult = await github.graphql(
              `
                query($owner: String!, $repo: String!) {
                  repository(owner: $owner, name: $repo) {
                    defaultBranchRef {
                      name
                    }
                  }
                }
              `,
              { owner, repo }
            );
            const defaultBranchName = defaultBranchResult.repository.defaultBranchRef?.name ?? "main";
            const openPulls = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: "open",
              base: defaultBranchName,
              per_page: 100,
            });

            for (const pullRequestSummary of openPulls) {
              const prResult = await github.graphql(
                `
                  query($owner: String!, $repo: String!, $number: Int!) {
                    repository(owner: $owner, name: $repo) {
                      pullRequest(number: $number) {
                        isDraft
                        headRefOid
                        commits(last: 1) {
                          nodes {
                            commit {
                              oid
                              committedDate
                              statusCheckRollup {
                                contexts(first: 100) {
                                  nodes {
                                    __typename
                                    ... on StatusContext {
                                      context
                                      state
                                    }
                                    ... on CheckRun {
                                      name
                                      conclusion
                                      status
                                    }
                                  }
                                }
                              }
                            }
                          }
                        }
                        reviewThreads(last: 100) {
                          nodes {
                            isResolved
                          }
                        }
                      }
                    }
                  }
                `,
                { owner, repo, number: pullRequestSummary.number }
              );

              const pullRequest = prResult.repository.pullRequest;
              if (!pullRequest) {
                continue;
              }

              if (!shouldRequeueCodexReviewGate({
                pullRequest,
              })) {
                continue;
              }

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: pullRequestSummary.number,
                body: "/codex-review-gate\n\nScheduled reevaluation on the next run after the 10-minute review window elapses.",
              });
            }

  codex-review-gate:
    name: PR Review Gate
    env:
      CODEX_QUOTA_EXHAUSTED: ${{ vars.CODEX_QUOTA_EXHAUSTED || 'false' }}
    if: >-
      ${{
        (github.event.pull_request != null || github.event.issue.pull_request != null) &&
        (
          github.event_name != 'issue_comment' ||
          (
            (
              github.event.comment.user.login == github.repository_owner ||
              github.event.comment.user.login == 'github-actions[bot]'
            ) &&
            contains(github.event.comment.body, '/codex-review-gate')
          )
        )
      }}
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: read
      contents: read
      statuses: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Evaluate review gate
        uses: actions/github-script@v7
        with:
          script: |
            const { evaluateCodexReviewGate, publishCodexReviewGateHeadStatus } = require(`${process.env.GITHUB_WORKSPACE}/.github/scripts/codex-review-gate`);
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber =
              context.payload.pull_request?.number ??
              context.payload.issue?.number ??
              context.payload.review_thread?.pull_request?.number;

            const query = `
              query($owner: String!, $repo: String!, $number: Int!) {
                repository(owner: $owner, name: $repo) {
                  pullRequest(number: $number) {
                    isDraft
                    headRefOid
                    commits(last: 1) {
                      nodes {
                        commit {
                          oid
                          committedDate
                          statusCheckRollup {
                            contexts(first: 100) {
                              nodes {
                                __typename
                                ... on StatusContext {
                                  context
                                  state
                                }
                                ... on CheckRun {
                                  name
                                  conclusion
                                  status
                                }
                              }
                            }
                          }
                        }
                      }
                    }
                    reviewThreads(last: 100) {
                      nodes {
                        isResolved
                        comments(first: 1) {
                          nodes {
                            author { login }
                          }
                        }
                      }
                    }
                  }
                }
              }
            `;

            const result = await github.graphql(query, { owner, repo, number: prNumber });
            const pullRequest = result.repository.pullRequest;
            if (!pullRequest) {
              core.setFailed(`Pull request #${prNumber} not found`);
              return;
            }

            // When CODEX_QUOTA_EXHAUSTED is set, skip bot-generated review threads
            // so the gate can pass without requiring Codex to review.
            const skipCodexCheck = process.env.CODEX_QUOTA_EXHAUSTED === 'true';
            if (skipCodexCheck) {
              core.info('CODEX_QUOTA_EXHAUSTED=true: bot review threads will be skipped');
            }

            const evaluation = evaluateCodexReviewGate({
              pullRequest,
              skipCodexCheck,
            });

            if (!pullRequest.headRefOid) {
              core.setFailed(`Pull request #${prNumber} is missing a current head SHA`);
              return;
            }

            const gateState = evaluation.ok ? "success" : "failure";
            await publishCodexReviewGateHeadStatus(github, {
              owner,
              repo,
              sha: pullRequest.headRefOid,
              state: gateState,
              description: evaluation.message,
            });

            if (!evaluation.ok) {
              core.setFailed(evaluation.message);
              return;
            }

            core.info(evaluation.message);
