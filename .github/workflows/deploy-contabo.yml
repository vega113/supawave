name: Deploy Contabo

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: deploy-contabo
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy Wave to Contabo
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
      issues: write
    env:
      RELEASE_ID: ${{ github.sha }}
      IMAGE_REF: ghcr.io/${{ github.repository }}:${{ github.sha }}
      CANONICAL_HOST: supawave.ai
      ROOT_HOST: wave.supawave.ai
      WWW_HOST: www.supawave.ai
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: sbt

      - name: Install sbt
        run: |
          sudo install -d -m 0755 /etc/apt/keyrings
          curl --fail --show-error --location --retry 5 \
            "https://keyserver.ubuntu.com/pks/lookup?op=get&search=0x2EE0EA64E40A89B84B2DF73499E82A75642AC823" \
            | sudo gpg --dearmor -o /etc/apt/keyrings/sbt-archive-keyring.gpg
          echo "deb [signed-by=/etc/apt/keyrings/sbt-archive-keyring.gpg] https://repo.scala-sbt.org/scalasbt/debian all main" \
            | sudo tee /etc/apt/sources.list.d/sbt.list > /dev/null
          sudo apt-get update -qq
          sudo apt-get install -y -qq sbt

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.CONTABO_SSH_KEY }}

      - name: Verify build
        timeout-minutes: 5
        run: sbt --batch "pst/compile; wave/compile; Universal/stage"

      - name: Log in to GitHub Container Registry
        run: |
          set -euo pipefail
          printf '%s' "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build and push container image
        run: |
          set -euo pipefail
          docker build --tag "$IMAGE_REF" .
          docker push "$IMAGE_REF"

      - name: Assemble deployment bundle
        run: |
          set -euo pipefail
          bundle_dir="$RUNNER_TEMP/supawave-bundle"
          rm -rf "$bundle_dir"
          mkdir -p "$bundle_dir"
          cp deploy/caddy/compose.yml "$bundle_dir/compose.yml"
          cp deploy/caddy/Caddyfile "$bundle_dir/Caddyfile"
          cp deploy/caddy/application.conf "$bundle_dir/application.conf"
          cp deploy/caddy/deploy.sh "$bundle_dir/deploy.sh"
          chmod +x "$bundle_dir/deploy.sh"
          tar -C "$bundle_dir" -czf "$RUNNER_TEMP/supawave-release.tgz" .

      - name: Trust Contabo host key
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.ssh"
          ssh-keyscan -p "${{ secrets.CONTABO_SSH_PORT || '22' }}" -H "${{ secrets.CONTABO_SSH_HOST }}" >> "$HOME/.ssh/known_hosts"

      - name: Upload bundle
        run: |
          set -euo pipefail
          remote_root="${{ secrets.CONTABO_DEPLOY_ROOT || format('/home/{0}/supawave', secrets.CONTABO_SSH_USER) }}"
          remote_incoming="$remote_root/incoming"
          ssh -p "${{ secrets.CONTABO_SSH_PORT || '22' }}" "${{ secrets.CONTABO_SSH_USER }}@${{ secrets.CONTABO_SSH_HOST }}" "mkdir -p '$remote_incoming'"
          scp -P "${{ secrets.CONTABO_SSH_PORT || '22' }}" "$RUNNER_TEMP/supawave-release.tgz" \
            "${{ secrets.CONTABO_SSH_USER }}@${{ secrets.CONTABO_SSH_HOST }}:$remote_incoming/$RELEASE_ID.tgz"

      - name: Deploy on Contabo
        id: deploy
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          WAVE_EMAIL_FROM: ${{ secrets.WAVE_EMAIL_FROM }}
        run: |
          set -euo pipefail
          remote_root="${{ secrets.CONTABO_DEPLOY_ROOT || format('/home/{0}/supawave', secrets.CONTABO_SSH_USER) }}"
          release_dir="$remote_root/releases/$RELEASE_ID"
          ssh -p "${{ secrets.CONTABO_SSH_PORT || '22' }}" "${{ secrets.CONTABO_SSH_USER }}@${{ secrets.CONTABO_SSH_HOST }}" "
            set -euo pipefail
            rm -rf '$release_dir'
            mkdir -p '$release_dir'
            tar -xzf '$remote_root/incoming/$RELEASE_ID.tgz' -C '$release_dir'
            chmod +x '$release_dir/deploy.sh'
            DEPLOY_ROOT='$remote_root' WAVE_IMAGE='$IMAGE_REF' CANONICAL_HOST='$CANONICAL_HOST' ROOT_HOST='$ROOT_HOST' WWW_HOST='$WWW_HOST' RESEND_API_KEY='$RESEND_API_KEY' WAVE_EMAIL_FROM='$WAVE_EMAIL_FROM' bash '$release_dir/deploy.sh' deploy
          "

      - name: Close deploy-failure issues on success
        if: success()
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'deploy-failure',
              state: 'open'
            });
            for (const issue of issues.filter(i => !i.pull_request)) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
                state_reason: 'completed'
              });
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `Resolved by successful deploy of ${context.sha.substring(0, 8)} in [run ${context.runId}](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}).`
              });
            }

      - name: Create GitHub issue on deploy failure
        if: ${{ failure() && steps.deploy.outcome == 'failure' }}
        uses: actions/github-script@v7
        with:
          script: |
            // Check for existing open deploy-failure issue to avoid duplicates
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'deploy-failure',
              state: 'open'
            });
            const existingIssues = existing.filter(i => !i.pull_request);
            if (existingIssues.length > 0) {
              const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssues[0].number,
                body: `Another deploy failure occurred.\n\n**Commit:** \`${context.sha.substring(0, 8)}\`\n**Run:** [${context.runId}](${runUrl})\n**Time:** ${new Date().toISOString()}`
              });
              core.info(`Commented on existing issue #${existingIssues[0].number}`);
              return;
            }

            // Ensure the deploy-failure label exists
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'deploy-failure'
              });
            } catch (e) {
              if (e.status === 404) {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: 'deploy-failure',
                  color: 'e11d48',
                  description: 'Automated: deploy to Contabo failed'
                });
              } else {
                throw e;
              }
            }

            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const title = `Deploy failed: ${context.sha.substring(0, 8)}`;
            const body = [
              `## Deploy Failure\n`,
              `| Field | Value |`,
              `|-------|-------|`,
              `| **Commit** | \`${context.sha}\` |`,
              `| **Branch** | \`${context.ref}\` |`,
              `| **Run** | [${context.runId}](${runUrl}) |`,
              `| **Triggered by** | @${context.actor} |`,
              `| **Time** | ${new Date().toISOString()} |\n`,
              `### Next Steps`,
              `1. Check the [deploy logs](${runUrl})`,
              `2. The previous version is still running (auto-rollback)`,
              `3. Fix the issue and push a new commit to trigger redeploy\n`,
              `> This issue will be auto-closed when the next deploy succeeds.`
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['deploy-failure']
            });
