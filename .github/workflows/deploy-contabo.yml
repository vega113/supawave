name: Deploy to Contabo
run-name: >-
  ${{ github.event_name == 'push'
      && format('Deploy main @ {0}', github.sha)
      || github.event_name == 'workflow_dispatch'
      && format('Deploy {0} @ {1}', github.ref_name, github.sha)
      || format('Deploy {0}', github.event_name) }}

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Deploy action'
        required: false
        default: 'deploy'
        type: choice
        options: ['deploy', 'rollback', 'status']
  push:
    branches:
      - main

concurrency:
  group: deploy-contabo
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Contabo
    # Auto-deploy on push only runs for main and when AUTO_DEPLOY_ENABLED != 'false'.
    # Manual workflow_dispatch always runs (any branch, for hotfixes).
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.ref == 'refs/heads/main' && vars.AUTO_DEPLOY_ENABLED != 'false')
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
      issues: write
    env:
      RELEASE_ID: ${{ github.sha }}
      IMAGE_REF: ghcr.io/${{ github.repository }}:${{ github.sha }}
      CANONICAL_HOST: supawave.ai
      ROOT_HOST: wave.supawave.ai
      WWW_HOST: www.supawave.ai
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate deploy sanity credentials
        if: github.event_name == 'push' || github.event.inputs.action != 'status'
        env:
          SANITY_ADDRESS: ${{ secrets.SANITY_ADDRESS }}
          SANITY_PASSWORD: ${{ secrets.SANITY_PASSWORD }}
        run: |
          set -euo pipefail
          : "${SANITY_ADDRESS:?Set repo secret SANITY_ADDRESS to the deploy sanity user login.}"
          : "${SANITY_PASSWORD:?Set repo secret SANITY_PASSWORD to the deploy sanity user password.}"

      - name: Assemble changelog from fragments
        if: github.event_name == 'push' || github.event.inputs.action == 'deploy'
        run: python3 scripts/assemble-changelog.py

      - name: Validate changelog
        if: github.event_name == 'push' || github.event.inputs.action == 'deploy'
        run: python3 scripts/validate-changelog.py --fragments-dir wave/config/changelog.d --changelog wave/config/changelog.json

      - name: Set up JDK 17
        if: github.event_name == 'push' || github.event.inputs.action == 'deploy'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: sbt

      - name: Set up sbt
        if: github.event_name == 'push' || github.event.inputs.action == 'deploy'
        uses: sbt/setup-sbt@v1

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.CONTABO_SSH_KEY }}

      - name: Build distribution
        if: github.event_name == 'push' || github.event.inputs.action == 'deploy'
        timeout-minutes: 30
        run: |
          for attempt in 1 2 3; do
            echo "Build attempt $attempt/3"
            log_file="$(mktemp)"
            status=0
            sbt --batch "pst/compile; wave/compile; compileGwt; Universal/stage" >"$log_file" 2>&1 || status=$?
            cat "$log_file"
            if [ "$status" -eq 0 ]; then
              rm -f "$log_file"
              break
            fi
            if grep -Eqi '(unresolved dependency|error downloading|download failed|read timed out|connection reset|connection timed out|502 bad gateway|503 service unavailable|temporary failure|coursier.*resolution|failed to download|sslhandshakeexception|sockettimeoutexception)' "$log_file"; then
              rm -f "$log_file"
              if [ $attempt -lt 3 ]; then
                echo "Transient dependency/plugin resolution failure on attempt $attempt, retrying in 30s..."
                sleep 30
              else
                echo "All 3 build attempts failed due to transient dependency/plugin resolution errors"
                exit "$status"
              fi
            else
              rm -f "$log_file"
              echo "Build failed with a non-transient error; failing fast without retry"
              exit "$status"
            fi
          done

      - name: Verify staged changelog asset
        if: github.event_name == 'push' || github.event.inputs.action == 'deploy'
        run: |
          set -euo pipefail
          staged_changelog="target/universal/stage/config/changelog.json"
          if [ ! -f "$staged_changelog" ]; then
            echo "Staged config/changelog.json was not found after the build"
            exit 1
          fi
          diff -u wave/config/changelog.json "$staged_changelog"

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' || github.event.inputs.action == 'deploy'
        run: |
          set -euo pipefail
          printf '%s' "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build and push container image
        if: github.event_name == 'push' || github.event.inputs.action == 'deploy'
        run: |
          set -euo pipefail
          docker build --tag "$IMAGE_REF" -f Dockerfile.prebuilt target/universal/stage
          bash scripts/docker-push-with-retry.sh "$IMAGE_REF"

      - name: Assemble deployment bundle
        run: |
          set -euo pipefail
          bundle_dir="$RUNNER_TEMP/supawave-bundle"
          rm -rf "$bundle_dir"
          mkdir -p "$bundle_dir"
          cp deploy/caddy/compose.yml "$bundle_dir/compose.yml"
          cp deploy/caddy/Caddyfile "$bundle_dir/Caddyfile"
          cp deploy/caddy/application.conf "$bundle_dir/application.conf"
          cp deploy/caddy/deploy.sh "$bundle_dir/deploy.sh"
          cp -R deploy/supawave-host "$bundle_dir/supawave-host"
          cp deploy/production/sysctl-tuning.conf "$bundle_dir/supawave-host/"
          cp deploy/production/limits.conf.prod "$bundle_dir/supawave-host/"
          chmod +x "$bundle_dir/supawave-host/"*.sh
          chmod +x "$bundle_dir/deploy.sh"
          tar -C "$bundle_dir" -czf "$RUNNER_TEMP/supawave-release.tgz" .

      - name: Trust Contabo host key
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.ssh"
          ssh-keyscan -p "${{ secrets.CONTABO_SSH_PORT || '22' }}" -H "${{ secrets.CONTABO_SSH_HOST }}" >> "$HOME/.ssh/known_hosts"

      - name: Upload bundle
        run: |
          set -euo pipefail
          remote_root="${{ secrets.CONTABO_DEPLOY_ROOT || format('/home/{0}/supawave', secrets.CONTABO_SSH_USER) }}"
          remote_incoming="$remote_root/incoming"
          ssh -o ServerAliveInterval=30 -o ServerAliveCountMax=20 -p "${{ secrets.CONTABO_SSH_PORT || '22' }}" "${{ secrets.CONTABO_SSH_USER }}@${{ secrets.CONTABO_SSH_HOST }}" "mkdir -p '$remote_incoming'"
          scp -P "${{ secrets.CONTABO_SSH_PORT || '22' }}" "$RUNNER_TEMP/supawave-release.tgz" \
            "${{ secrets.CONTABO_SSH_USER }}@${{ secrets.CONTABO_SSH_HOST }}:$remote_incoming/$RELEASE_ID.tgz"

      - name: Deploy on Contabo
        id: deploy
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          WAVE_EMAIL_FROM: ${{ secrets.WAVE_EMAIL_FROM }}
          SANITY_ADDRESS: ${{ secrets.SANITY_ADDRESS }}
          SANITY_PASSWORD: ${{ secrets.SANITY_PASSWORD }}
          GRAFANA_ALLOY_ENABLE: ${{ vars.GRAFANA_ALLOY_ENABLE }}
          GCLOUD_HOSTED_METRICS_URL: ${{ secrets.GCLOUD_HOSTED_METRICS_URL }}
          GCLOUD_HOSTED_METRICS_ID: ${{ secrets.GCLOUD_HOSTED_METRICS_ID }}
          GCLOUD_HOSTED_LOGS_URL: ${{ secrets.GCLOUD_HOSTED_LOGS_URL }}
          GCLOUD_HOSTED_LOGS_ID: ${{ secrets.GCLOUD_HOSTED_LOGS_ID }}
          GCLOUD_RW_API_KEY: ${{ secrets.GCLOUD_RW_API_KEY }}
          GCLOUD_SCRAPE_INTERVAL: ${{ vars.GCLOUD_SCRAPE_INTERVAL }}
        run: |
          set -euo pipefail
          remote_root="${{ secrets.CONTABO_DEPLOY_ROOT || format('/home/{0}/supawave', secrets.CONTABO_SSH_USER) }}"
          action="${{ github.event.inputs.action || 'deploy' }}"
          resend_api_key_q=$(printf '%q' "${RESEND_API_KEY:-}")
          wave_email_from_q=$(printf '%q' "${WAVE_EMAIL_FROM:-}")
          sanity_address_q=$(printf '%q' "${SANITY_ADDRESS:-}")
          sanity_password_q=$(printf '%q' "${SANITY_PASSWORD:-}")
          grafana_alloy_enable="${GRAFANA_ALLOY_ENABLE:-false}"
          gcloud_metrics_url_q=$(printf '%q' "${GCLOUD_HOSTED_METRICS_URL:-}")
          gcloud_metrics_id_q=$(printf '%q' "${GCLOUD_HOSTED_METRICS_ID:-}")
          gcloud_logs_url_q=$(printf '%q' "${GCLOUD_HOSTED_LOGS_URL:-}")
          gcloud_logs_id_q=$(printf '%q' "${GCLOUD_HOSTED_LOGS_ID:-}")
          gcloud_rw_api_key_q=$(printf '%q' "${GCLOUD_RW_API_KEY:-}")
          gcloud_scrape_interval_q=$(printf '%q' "${GCLOUD_SCRAPE_INTERVAL:-60s}")
          ssh -o ServerAliveInterval=30 -o ServerAliveCountMax=20 -p "${{ secrets.CONTABO_SSH_PORT || '22' }}" "${{ secrets.CONTABO_SSH_USER }}@${{ secrets.CONTABO_SSH_HOST }}" "
            set -euo pipefail
            incoming='$remote_root/incoming/$RELEASE_ID'
            mkdir -p \"\$incoming\"
            tar -xzf '$remote_root/incoming/$RELEASE_ID.tgz' -C \"\$incoming\"
            chmod +x \"\$incoming/deploy.sh\"
            chmod +x \"\$incoming/supawave-host/\"*.sh
            if [ \"$action\" = \"deploy\" ]; then
              echo '[deploy] Applying supawave host tuning'
              sudo -n env BACKUP_DIR='/var/backups/wave-supawave' \"\$incoming/supawave-host/provision.sh\"
              if [ "${grafana_alloy_enable,,}" = "true" ]; then
                echo '[deploy] Installing and configuring Grafana Alloy'
                export \
                  GCLOUD_HOSTED_METRICS_URL=$gcloud_metrics_url_q \
                  GCLOUD_HOSTED_METRICS_ID=$gcloud_metrics_id_q \
                  GCLOUD_HOSTED_LOGS_URL=$gcloud_logs_url_q \
                  GCLOUD_HOSTED_LOGS_ID=$gcloud_logs_id_q \
                  GCLOUD_RW_API_KEY=$gcloud_rw_api_key_q \
                  GCLOUD_SCRAPE_INTERVAL=$gcloud_scrape_interval_q
                sudo -n --preserve-env=GCLOUD_HOSTED_METRICS_URL,GCLOUD_HOSTED_METRICS_ID,GCLOUD_HOSTED_LOGS_URL,GCLOUD_HOSTED_LOGS_ID,GCLOUD_RW_API_KEY,GCLOUD_SCRAPE_INTERVAL \
                  \"\$incoming/supawave-host/install-grafana-alloy.sh\"
                export WAVE_LOG_PATH='$remote_root/shared/logs/wave-json*.log'
                sudo -n --preserve-env=GCLOUD_HOSTED_METRICS_URL,GCLOUD_HOSTED_METRICS_ID,GCLOUD_HOSTED_LOGS_URL,GCLOUD_HOSTED_LOGS_ID,GCLOUD_RW_API_KEY,GCLOUD_SCRAPE_INTERVAL,WAVE_LOG_PATH \
                  \"\$incoming/supawave-host/configure-grafana-alloy.sh\"
                unset GCLOUD_HOSTED_METRICS_URL GCLOUD_HOSTED_METRICS_ID GCLOUD_HOSTED_LOGS_URL GCLOUD_HOSTED_LOGS_ID GCLOUD_RW_API_KEY GCLOUD_SCRAPE_INTERVAL WAVE_LOG_PATH
              else
                echo '[deploy] Skipping Grafana Alloy setup (GRAFANA_ALLOY_ENABLE=false)'
              fi
            fi
            DEPLOY_ROOT='$remote_root' \
            WAVE_IMAGE='$IMAGE_REF' \
            CANONICAL_HOST='$CANONICAL_HOST' \
            ROOT_HOST='$ROOT_HOST' \
            WWW_HOST='$WWW_HOST' \
            RESEND_API_KEY=$resend_api_key_q \
            WAVE_EMAIL_FROM=$wave_email_from_q \
            SANITY_ADDRESS=$sanity_address_q \
            SANITY_PASSWORD=$sanity_password_q \
              bash \"\$incoming/deploy.sh\" \"$action\"
          "

      - name: Close deploy-failure issues on success
        if: steps.deploy.outcome == 'success' && (github.event_name == 'push' || github.event.inputs.action == 'deploy')
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'deploy-failure',
              state: 'open'
            });
            for (const issue of issues.filter(i => !i.pull_request)) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
                state_reason: 'completed'
              });
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `Resolved by successful deploy of ${context.sha.substring(0, 8)} in [run ${context.runId}](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}).`
              });
            }

      - name: Create GitHub issue on deploy failure
        if: always() && failure() && !cancelled() && (github.event_name == 'push' || github.event.inputs.action == 'deploy')
        uses: actions/github-script@v7
        with:
          script: |
            // Check for existing open deploy-failure issue to avoid duplicates
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'deploy-failure',
              state: 'open'
            });
            const existingIssues = existing.filter(i => !i.pull_request);
            if (existingIssues.length > 0) {
              const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssues[0].number,
                body: `Another deploy failure occurred.\n\n**Commit:** \`${context.sha.substring(0, 8)}\`\n**Run:** [${context.runId}](${runUrl})\n**Time:** ${new Date().toISOString()}`
              });
              core.info(`Commented on existing issue #${existingIssues[0].number}`);
              return;
            }

            // Ensure the deploy-failure label exists
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'deploy-failure'
              });
            } catch (e) {
              if (e.status === 404) {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: 'deploy-failure',
                  color: 'e11d48',
                  description: 'Automated: deploy to Contabo failed'
                });
              } else {
                throw e;
              }
            }

            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            // Use the Actions API to find which step failed
            let failedStep = 'Unknown step';
            try {
              const { data: jobs } = await github.rest.actions.listJobsForWorkflowRun({
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: context.runId,
              });
              for (const job of jobs.jobs) {
                const failed = (job.steps || []).find(s => s.conclusion === 'failure');
                if (failed) { failedStep = failed.name; break; }
              }
            } catch (e) { core.warning('Could not detect failed step: ' + e.message); }
            const title = `Deploy failed: ${context.sha.substring(0, 8)} (${failedStep})`;
            const body = [
              `## Deploy Failure\n`,
              `| Field | Value |`,
              `|-------|-------|`,
              `| **Commit** | \`${context.sha}\` |`,
              `| **Branch** | \`${context.ref}\` |`,
              `| **Failed step** | ${failedStep} |`,
              `| **Run** | [${context.runId}](${runUrl}) |`,
              `| **Triggered by** | @${context.actor} |`,
              `| **Time** | ${new Date().toISOString()} |\n`,
              `### Next Steps`,
              `1. Check the [deploy logs](${runUrl})`,
              `2. The previous version is still running (auto-rollback)`,
              `3. Fix the issue and push a new commit to trigger redeploy\n`,
              `> This issue will be auto-closed when the next deploy succeeds.`
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['deploy-failure', 'agent-task']
            });

      - name: Extract changelog for deploy email
        if: always() && (github.event_name == 'push' || github.event.inputs.action == 'deploy')
        id: changelog
        run: |
          CHANGELOG_HTML=""
          # Find fragment files added since the previous commit on this branch.
          # For push events github.event.before is the SHA before this push;
          # for workflow_dispatch fall back to HEAD~1.
          PREV_SHA="${{ github.event.before }}"
          if [ -z "$PREV_SHA" ] || [ "$PREV_SHA" = "0000000000000000000000000000000000000000" ]; then
            PREV_SHA=$(git rev-parse HEAD~1 2>/dev/null || echo "")
          fi

          NEW_FRAGMENTS=""
          if [ -n "$PREV_SHA" ] && git cat-file -e "$PREV_SHA" 2>/dev/null; then
            # List fragment files added (A) or modified (M) since the previous SHA
            NEW_FRAGMENTS=$(git diff --name-only --diff-filter=AM "$PREV_SHA"..HEAD -- wave/config/changelog.d/ 2>/dev/null || true)
          fi

          if [ -n "$NEW_FRAGMENTS" ]; then
            # Build HTML from only the newly added/changed fragments
            CHANGELOG_HTML=$(NEW_FRAGMENTS="$NEW_FRAGMENTS" python3 - <<'PY'
          import html, json, os, sys
          from pathlib import Path

          fragments_raw = os.environ.get("NEW_FRAGMENTS", "").strip()
          if not fragments_raw:
              sys.exit(0)

          entries = []
          for fpath in fragments_raw.splitlines():
              p = Path(fpath.strip())
              if p.exists() and p.suffix == ".json":
                  try:
                      entry = json.loads(p.read_text())
                      if isinstance(entry, dict) and entry.get("title"):
                          entries.append(entry)
                  except Exception:
                      pass

          # Sort newest first by date then releaseId
          entries.sort(key=lambda e: (e.get("date", ""), e.get("releaseId", "")), reverse=True)

          if entries:
              lines = [
                  "<li><strong>%s</strong> (%s, %s)</li>" % (
                      html.escape(e.get("title", "")),
                      html.escape(e.get("version", "")),
                      html.escape(e.get("date", "")),
                  )
                  for e in entries
              ]
              print("<h3>Changes in this deploy</h3><ul>" + "".join(lines) + "</ul>")
          PY
          ) || true
          fi

          # No new fragments = hotfix or CI-only deploy.
          # Show the git commit subjects between PREV_SHA and RELEASE_ID so the
          # email still conveys what changed, even without a formal changelog entry.
          if [ -z "$CHANGELOG_HTML" ] && [ -n "$PREV_SHA" ] && git cat-file -e "$PREV_SHA" 2>/dev/null; then
            COMMIT_LOG=$(git log --oneline "$PREV_SHA".."$RELEASE_ID" \
              --pretty=format:'%s' 2>/dev/null | head -10 || true)
            if [ -n "$COMMIT_LOG" ]; then
              CHANGELOG_HTML=$(COMMIT_LOG="$COMMIT_LOG" python3 - <<'PY'
          import html, os
          log = os.environ.get("COMMIT_LOG", "").strip()
          if not log:
              exit(0)
          lines = ["<li>%s</li>" % html.escape(l.strip()) for l in log.splitlines() if l.strip()]
          if lines:
              print("<h3>Hotfix commits</h3><ul>" + "".join(lines) + "</ul>")
          PY
              ) || true
            fi
          fi

          # Last resort: nothing useful to show
          if [ -z "$CHANGELOG_HTML" ]; then
            CHANGELOG_HTML="<p style='color:#888;font-size:13px;'>No changelog entry for this deploy.</p>"
          fi

          echo "$CHANGELOG_HTML" > /tmp/changelog_html.txt

      - name: Notify deploy success
        if: always() && steps.deploy.outcome == 'success' && (github.event_name == 'push' || github.event.inputs.action == 'deploy')
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          WAVE_EMAIL_FROM: ${{ secrets.WAVE_EMAIL_FROM }}
          NOTIFICATION_RECIPIENTS: ${{ vars.NOTIFICATION_RECIPIENTS || secrets.ON_CALL_EMAILS || 'vega113@gmail.com' }}
        run: |
          CHANGELOG_HTML=$(cat /tmp/changelog_html.txt 2>/dev/null || true)
          EMAIL_SUBJECT="SupaWave deployed: ${RELEASE_ID:0:8}"
          EMAIL_HTML="<h2>Deploy succeeded</h2><table><tr><td>Commit</td><td><code>${RELEASE_ID:0:8}</code></td></tr><tr><td>Branch</td><td><code>${GITHUB_REF_NAME}</code></td></tr><tr><td>Image</td><td><code>$IMAGE_REF</code></td></tr><tr><td>Host</td><td>$CANONICAL_HOST</td></tr><tr><td>Run</td><td><a href='https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID'>View run</a></td></tr></table>${CHANGELOG_HTML}"
          recipients_json=$(python3 - <<'PY'
          import json
          import os
          import sys

          raw = os.getenv("NOTIFICATION_RECIPIENTS", "").strip()
          if not raw:
              print("")
              sys.exit(0)

          if raw.startswith("["):
              try:
                  recipients = [item.strip() for item in json.loads(raw) if isinstance(item, str) and item.strip()]
                  print(json.dumps(recipients))
                  sys.exit(0)
              except Exception:
                  pass

          recipients = [item.strip() for item in raw.split(",") if item.strip()]
          print(json.dumps(recipients))
          PY
          )
          if [ -z "$recipients_json" ] || [ "$recipients_json" = "[]" ]; then
            echo "No deploy notification recipients configured; skipping email notification."
            exit 0
          fi
          PAYLOAD=$(WAVE_EMAIL_FROM_VALUE="${WAVE_EMAIL_FROM:-noreply@supawave.ai}" RECIPIENTS_JSON="$recipients_json" EMAIL_SUBJECT="$EMAIL_SUBJECT" EMAIL_HTML="$EMAIL_HTML" python3 -c 'import json, os; print(json.dumps({"from": os.environ["WAVE_EMAIL_FROM_VALUE"], "to": json.loads(os.environ["RECIPIENTS_JSON"]), "subject": os.environ["EMAIL_SUBJECT"], "html": os.environ["EMAIL_HTML"]}))')
          RESPONSE=$(curl -s --fail-with-body -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer $RESEND_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD") || echo "Email notification failed (non-blocking): $RESPONSE"

      - name: Notify deploy failure
        if: always() && failure() && !cancelled() && (github.event_name == 'push' || github.event.inputs.action == 'deploy')
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          WAVE_EMAIL_FROM: ${{ secrets.WAVE_EMAIL_FROM }}
          NOTIFICATION_RECIPIENTS: ${{ vars.NOTIFICATION_RECIPIENTS || secrets.ON_CALL_EMAILS || 'vega113@gmail.com' }}
        run: |
          EMAIL_SUBJECT="SupaWave deploy FAILED: ${RELEASE_ID:0:8}"
          EMAIL_HTML="<h2>Deploy failed</h2><p>The production deploy failed and the previous version is still running.</p><table><tr><td>Commit</td><td><code>${RELEASE_ID:0:8}</code></td></tr><tr><td>Branch</td><td><code>${GITHUB_REF_NAME}</code></td></tr><tr><td>Image</td><td><code>$IMAGE_REF</code></td></tr><tr><td>Host</td><td>$CANONICAL_HOST</td></tr><tr><td>Logs</td><td><a href='https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID'>View full logs</a></td></tr></table><p><strong>Next steps:</strong> Check the deploy logs linked above. Previous version is auto-preserved.</p>"
          recipients_json=$(python3 - <<'PY'
          import json
          import os
          import sys

          raw = os.getenv("NOTIFICATION_RECIPIENTS", "").strip()
          if not raw:
              print("")
              sys.exit(0)

          if raw.startswith("["):
              try:
                  recipients = [item.strip() for item in json.loads(raw) if isinstance(item, str) and item.strip()]
                  print(json.dumps(recipients))
                  sys.exit(0)
              except Exception:
                  pass

          recipients = [item.strip() for item in raw.split(",") if item.strip()]
          print(json.dumps(recipients))
          PY
          )
          if [ -z "$recipients_json" ] || [ "$recipients_json" = "[]" ]; then
            echo "No deploy notification recipients configured; skipping email notification."
            exit 0
          fi
          PAYLOAD=$(WAVE_EMAIL_FROM_VALUE="${WAVE_EMAIL_FROM:-noreply@supawave.ai}" RECIPIENTS_JSON="$recipients_json" EMAIL_SUBJECT="$EMAIL_SUBJECT" EMAIL_HTML="$EMAIL_HTML" python3 -c 'import json, os; print(json.dumps({"from": os.environ["WAVE_EMAIL_FROM_VALUE"], "to": json.loads(os.environ["RECIPIENTS_JSON"]), "subject": os.environ["EMAIL_SUBJECT"], "html": os.environ["EMAIL_HTML"]}))')
          RESPONSE=$(curl -s --fail-with-body -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer $RESEND_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD") || echo "Email notification failed (non-blocking): $RESPONSE"
