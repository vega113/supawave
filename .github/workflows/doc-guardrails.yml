name: Doc Guardrails

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

# Dedupe superseded PR runs; push-to-main runs use the unique run id as their
# group key, so they never share a group and are never cancelled.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  doc-guardrails:
    name: Doc Link & Freshness Checks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check doc links
        run: bash scripts/check-doc-links.sh

      - name: Check doc freshness metadata
        run: bash scripts/check-doc-freshness.sh
