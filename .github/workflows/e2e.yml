name: E2E Tests
run-name: >-
  ${{ github.event_name == 'pull_request' && format('E2E PR #{0} @ {1}', github.event.pull_request.number, github.event.pull_request.head.sha) || github.event_name == 'push' && format('E2E {0} @ {1}', github.ref_name, github.sha) || github.event_name == 'workflow_dispatch' && format('E2E {0} @ {1}', github.ref_name, github.sha) || format('E2E {0}', github.event_name) }}

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

# Dedupe superseded PR runs (rapid pushes / force-pushes). For push events the
# group key is the unique run id, so main runs never share a group and are never
# cancelled -- coverage on every landed commit is preserved.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  e2e:
    name: E2E WebSocket Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'sbt'

      - name: Set up sbt
        uses: sbt/setup-sbt@v1

      - name: Assemble changelog from fragments
        run: python3 scripts/assemble-changelog.py

      - name: Compile PST and Wave
        run: sbt --batch pst/compile wave/compile

      - name: Stage distribution
        run: sbt --batch Universal/stage

      - name: Run E2E tests
        run: bash scripts/wave-e2e.sh

      - name: Upload E2E results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results
          # Debug-only output kept short; nothing downstream consumes it.
          retention-days: 7
          path: |
            wave/target/e2e-results/
            target/universal/stage/wave_server.out
