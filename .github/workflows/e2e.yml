name: E2E Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  e2e:
    name: E2E WebSocket Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'sbt'

      - name: Install sbt
        run: |
          set -euo pipefail
          curl --fail --show-error --location --retry 3 \
            "https://github.com/sbt/sbt/releases/download/v1.10.7/sbt-1.10.7.tgz" \
            --output /tmp/sbt.tgz
          sudo tar xzf /tmp/sbt.tgz -C /usr/local
          sudo ln -sf /usr/local/sbt/bin/sbt /usr/local/bin/sbt

      - name: Compile PST and Wave
        run: sbt --batch pst/compile wave/compile

      - name: Stage distribution
        run: sbt --batch Universal/stage

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r wave/src/e2e-test/requirements.txt

      - name: Run E2E tests
        run: PYTHON=python bash scripts/wave-e2e.sh

      - name: Upload E2E results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results
          path: |
            wave/target/e2e-results/
            target/universal/stage/wave_server.out
