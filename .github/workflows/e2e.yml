name: E2E Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  e2e:
    name: E2E WebSocket Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Gradle cache
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-disabled: false

      - name: Build distribution
        run: ./gradlew --no-daemon --warning-mode all :wave:installDist

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r wave/src/e2e-test/requirements.txt

      - name: Run E2E tests
        run: PYTHON=python bash scripts/wave-e2e.sh

      - name: Upload E2E results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results
          path: |
            wave/build/e2e-results/
            wave/build/install/wave/wave_server.out
