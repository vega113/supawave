name: E2E Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  e2e:
    name: E2E WebSocket Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'sbt'

      - name: Install sbt
        run: |
          sudo install -d -m 0755 /etc/apt/keyrings
          curl --fail --show-error --location --retry 5 \
            "https://keyserver.ubuntu.com/pks/lookup?op=get&search=0x2EE0EA64E40A89B84B2DF73499E82A75642AC823" \
            | sudo gpg --dearmor -o /etc/apt/keyrings/sbt-archive-keyring.gpg
          echo "deb [signed-by=/etc/apt/keyrings/sbt-archive-keyring.gpg] https://repo.scala-sbt.org/scalasbt/debian all main" \
            | sudo tee /etc/apt/sources.list.d/sbt.list > /dev/null
          sudo apt-get update -qq
          sudo apt-get install -y -qq sbt

      - name: Build distribution
        run: sbt --batch Universal/stage

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r wave/src/e2e-test/requirements.txt

      - name: Run E2E tests
        run: PYTHON=python bash scripts/wave-e2e.sh

      - name: Upload E2E results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results
          path: |
            wave/target/e2e-results/
            wave/target/universal/stage/wave_server.out
