name: Performance Tests
run-name: >-
  ${{ github.event_name == 'pull_request' && format('Perf PR #{0} @ {1}', github.event.pull_request.number, github.event.pull_request.head.sha) || github.event_name == 'push' && format('Perf {0} @ {1}', github.ref_name, github.sha) || github.event_name == 'workflow_dispatch' && format('Perf {0} @ {1}', github.ref_name, github.sha) || format('Perf {0}', github.event_name) }}

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  perf:
    name: Gatling Performance Tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      GCLOUD_HOSTED_METRICS_URL: ${{ secrets.GCLOUD_HOSTED_METRICS_URL }}
      GCLOUD_HOSTED_METRICS_ID: ${{ secrets.GCLOUD_HOSTED_METRICS_ID }}
      GCLOUD_RW_API_KEY: ${{ secrets.GCLOUD_RW_API_KEY }}
      GRAFANA_URL: ${{ vars.GRAFANA_URL }}
      GRAFANA_DASHBOARD_API_TOKEN: ${{ secrets.GRAFANA_DASHBOARD_API_TOKEN }}
      GRAFANA_PROMETHEUS_DATASOURCE_UID: ${{ vars.GRAFANA_PROMETHEUS_DATASOURCE_UID }}
      GRAFANA_FOLDER_UID: ${{ vars.GRAFANA_FOLDER_UID }}
      GRAFANA_ALLOY_VERSION: v1.11.2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'sbt'

      - name: Set up sbt
        uses: sbt/setup-sbt@v1

      - name: Assemble changelog from fragments
        run: python3 scripts/assemble-changelog.py

      - name: Compile PST and Wave
        run: sbt --batch pst/compile wave/compile

      - name: Stage distribution
        run: sbt --batch Universal/stage

      - name: Install Grafana Alloy
        if: ${{ env.GCLOUD_HOSTED_METRICS_URL != '' && env.GCLOUD_HOSTED_METRICS_ID != '' && env.GCLOUD_RW_API_KEY != '' }}
        run: |
          curl -fsSL -o "$RUNNER_TEMP/alloy.zip" \
            "https://github.com/grafana/alloy/releases/download/${GRAFANA_ALLOY_VERSION}/alloy-linux-amd64.zip"
          unzip -q "$RUNNER_TEMP/alloy.zip" -d "$RUNNER_TEMP/alloy"
          install "$RUNNER_TEMP/alloy/alloy-linux-amd64" /usr/local/bin/alloy

      - name: Start perf metrics exporter
        run: |
          nohup python3 scripts/perf_metrics_exporter.py serve \
            --results-dir wave/target/perf-results \
            --listen 127.0.0.1:9464 \
            >"$RUNNER_TEMP/perf-exporter.log" 2>&1 &

      - name: Render perf Alloy config
        if: ${{ env.GCLOUD_HOSTED_METRICS_URL != '' && env.GCLOUD_HOSTED_METRICS_ID != '' && env.GCLOUD_RW_API_KEY != '' }}
        run: |
          python3 scripts/render_perf_alloy_config.py \
            --output "$RUNNER_TEMP/perf.alloy" \
            --metrics-url "$GCLOUD_HOSTED_METRICS_URL" \
            --metrics-id "$GCLOUD_HOSTED_METRICS_ID" \
            --api-key-env-var "GCLOUD_RW_API_KEY" \
            --base-url "http://127.0.0.1:9898" \
            --exporter-port 9464 \
            --repo "${GITHUB_REPOSITORY}" \
            --branch "${GITHUB_REF_NAME}" \
            --sha "${GITHUB_SHA}" \
            --workflow "perf" \
            --run-id "${GITHUB_RUN_ID}" \
            --run-attempt "${GITHUB_RUN_ATTEMPT}"

      - name: Start Grafana Alloy
        if: ${{ env.GCLOUD_HOSTED_METRICS_URL != '' && env.GCLOUD_HOSTED_METRICS_ID != '' && env.GCLOUD_RW_API_KEY != '' }}
        run: |
          nohup alloy run "$RUNNER_TEMP/perf.alloy" \
            >"$RUNNER_TEMP/alloy.log" 2>&1 &

      - name: Run performance tests
        run: bash scripts/wave-perf.sh

      - name: Ensure Gatling reports collected
        if: always()
        run: |
          if [ -d target/gatling ] && [ ! -d wave/target/perf-results/gatling-reports ]; then
            mkdir -p wave/target/perf-results
            cp -r target/gatling wave/target/perf-results/gatling-reports
          fi

      - name: Upload performance results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-results
          retention-days: 30
          path: |
            wave/target/perf-results/
            target/universal/stage/wave_server.out
            ${{ runner.temp }}/perf-exporter.log
            ${{ runner.temp }}/alloy.log

      - name: Upsert Grafana dashboard
        if: ${{ always() && env.GRAFANA_URL != '' && env.GRAFANA_DASHBOARD_API_TOKEN != '' && env.GRAFANA_PROMETHEUS_DATASOURCE_UID != '' }}
        run: |
          if [ -f scripts/upsert_grafana_dashboard.py ]; then
            python3 scripts/upsert_grafana_dashboard.py
          else
            echo "Grafana dashboard helper not present yet; skipping"
          fi
