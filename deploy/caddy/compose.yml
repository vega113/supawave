x-wave-env: &wave-env
  RESEND_API_KEY: ${RESEND_API_KEY:-}
  WAVE_EMAIL_FROM: ${WAVE_EMAIL_FROM:-noreply@supawave.ai}
  WAVE_MAIL_PROVIDER: ${WAVE_MAIL_PROVIDER:-logging}
  WAVE_SERVER_VERSION: ${WAVE_SERVER_VERSION:-dev}

services:
  mongo:
    image: mongo:6.0
    restart: unless-stopped
    command:
      - --bind_ip_all
      # Cap WiredTiger cache to prevent MongoDB from starving the JVMs.
      # Default is (totalRAM - 1 GiB) / 2 which over-allocates on large hosts.
      - --wiredTigerCacheSizeGB=8
      - --slowms=100
      - --profile=1
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'db.runCommand({ ping: 1 }).ok' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    mem_limit: 12g
    cpus: 4
    mem_reservation: 10g
    volumes:
      - ${DEPLOY_ROOT:?set DEPLOY_ROOT before running compose}/shared/mongo/db:/data/db

  wave-blue:
    image: ${WAVE_IMAGE_BLUE:-scratch}
    container_name: wave-blue
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9898/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 300s
    ports:
      - "127.0.0.1:9898:9898"
    # 20 GiB heap + 2 GiB JVM overhead (metaspace, thread stacks, NIO, Lucene mmap)
    mem_limit: 22g
    cpus: 8
    mem_reservation: 20g
    ulimits:
      nofile:
        soft: 131072
        hard: 262144
      nproc:
        soft: 65536
        hard: 65536
    volumes:
      - ${DEPLOY_ROOT:?}/releases/blue/application.conf:/opt/wave/config/application.conf:ro
      - ${DEPLOY_ROOT:?}/shared/accounts:/opt/wave/_accounts
      - ${DEPLOY_ROOT:?}/shared/attachments:/opt/wave/_attachments
      - ${DEPLOY_ROOT:?}/shared/certificates:/opt/wave/_certificates
      - ${DEPLOY_ROOT:?}/shared/deltas:/opt/wave/_deltas
      - ${DEPLOY_ROOT:?}/shared/indexes/blue:/opt/wave/_indexes
      - ${DEPLOY_ROOT:?}/shared/sessions/blue:/opt/wave/_sessions
      - ${DEPLOY_ROOT:?}/shared/logs:/opt/wave/logs
    # -J flags are passed directly to the JVM by the SBT native-packager launcher
    # and have HIGHER precedence than the hardcoded defaults in bin/wave.
    # JAVA_OPTS has LOWER precedence and cannot override the baked-in -Xmx1024M.
    command:
      - -J-Xmx20G
      - -J-Xms6G
      - -J-XX:+UseG1GC
      - -J-XX:MaxGCPauseMillis=200
      - -J-XX:+HeapDumpOnOutOfMemoryError
      - -J-XX:HeapDumpPath=/opt/wave/logs/heapdump-blue.hprof
      - -J-Xlog:gc*:file=/opt/wave/logs/gc-blue.log:time,uptime,level,tags:filecount=5,filesize=50m
    environment: *wave-env

  wave-green:
    image: ${WAVE_IMAGE_GREEN:-scratch}
    container_name: wave-green
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9898/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 300s
    ports:
      - "127.0.0.1:9899:9898"
    mem_limit: 22g
    cpus: 8
    mem_reservation: 20g
    ulimits:
      nofile:
        soft: 131072
        hard: 262144
      nproc:
        soft: 65536
        hard: 65536
    volumes:
      - ${DEPLOY_ROOT:?}/releases/green/application.conf:/opt/wave/config/application.conf:ro
      - ${DEPLOY_ROOT:?}/shared/accounts:/opt/wave/_accounts
      - ${DEPLOY_ROOT:?}/shared/attachments:/opt/wave/_attachments
      - ${DEPLOY_ROOT:?}/shared/certificates:/opt/wave/_certificates
      - ${DEPLOY_ROOT:?}/shared/deltas:/opt/wave/_deltas
      - ${DEPLOY_ROOT:?}/shared/indexes/green:/opt/wave/_indexes
      - ${DEPLOY_ROOT:?}/shared/sessions/green:/opt/wave/_sessions
      - ${DEPLOY_ROOT:?}/shared/logs:/opt/wave/logs
    command:
      - -J-Xmx20G
      - -J-Xms6G
      - -J-XX:+UseG1GC
      - -J-XX:MaxGCPauseMillis=200
      - -J-XX:+HeapDumpOnOutOfMemoryError
      - -J-XX:HeapDumpPath=/opt/wave/logs/heapdump-green.hprof
      - -J-Xlog:gc*:file=/opt/wave/logs/gc-green.log:time,uptime,level,tags:filecount=5,filesize=50m
    environment: *wave-env
    profiles: ["green"]

  caddy:
    image: caddy:2.8.4-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    mem_limit: 1g
    cpus: 2
    mem_reservation: 256m
    ulimits:
      nofile:
        soft: 131072
        hard: 262144
      nproc:
        soft: 65536
        hard: 65536
    environment:
      CANONICAL_HOST: ${CANONICAL_HOST:?set CANONICAL_HOST before running compose}
      ROOT_HOST: ${ROOT_HOST:?set ROOT_HOST before running compose}
      WWW_HOST: ${WWW_HOST:?set WWW_HOST before running compose}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ${DEPLOY_ROOT:?}/shared/upstream.caddy:/etc/caddy/upstream.caddy:ro
      - ${DEPLOY_ROOT:?}/shared/caddy-data:/data
      - ${DEPLOY_ROOT:?}/shared/caddy-config:/config
