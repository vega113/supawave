core {
  wave_server_domain = "wave.example.test"
  http_frontend_addresses = ["0.0.0.0:9898"]
  http_frontend_public_address = "wave.example.test"
  http_websocket_public_address = "wave.example.test"
  http_websocket_presented_address = "wave.example.test"
  signer_info_store_type = "file"
  attachment_store_type = "disk"
  account_store_type = "file"
  delta_store_type = "file"
  mongodb_host = "mongo"
  mongodb_port = 27017
  mongodb_database = "wiab"
  mongodb_driver = "v4"
}

network {
  session_cookie_http_only = false
}

security {
  enable_ssl = false
  jwt_signing_key_path = "/opt/wave/_certificates/wave-session-jwt.properties"
}

server.fragments.transport = "stream"
server.preferSegmentState = true
server.enableStorageSegmentState = true
wave.fragments.metrics.enabled = true
wave.clientApplierStats.enabled = true
wave.fragments.forceClientApplier = true

client.flags.defaults {
  fragmentFetchMode = "stream"
  enableDynamicRendering = true
  enableFragmentsApplier = true
  enableViewportStats = true
  enableFragmentFetchViewChannel = true
  enableFragmentFetchForceLayer = false
  enableQuasiDeletionUi = true
  quasiDeletionDwellMs = 5000
  fragmentsApplierMaxRanges = 3
  forceClientFragments = true
}

core.search_type = "lucene"
core.enable_profiling = false
