# =============================================================================
# Production Kernel Parameters for Wave Server
# =============================================================================
#
# Target host: supawave (94 GiB RAM, 18 cores, Ubuntu/Debian)
#
# Installation:
#   sudo cp sysctl-tuning.conf /etc/sysctl.d/99-wave.conf
#   sudo sysctl --system        # reload all sysctl configs
#
# These settings optimize the kernel for a Java application server that
# handles many concurrent WebSocket connections (Jetty), maintains Lucene
# index files, and runs alongside MongoDB.
#
# WARNING: Review and adjust values before applying to hosts with different
#          hardware profiles.  In particular:
#          - vm.swappiness assumes swap has been provisioned (see Phase 1.3
#            in RESOURCE_OPTIMIZATION_ANALYSIS.md)
#          - net.* settings are sized for the supawave 18-core host
# =============================================================================

# ---------------------------------------------------------------------------
# File Descriptors
# ---------------------------------------------------------------------------
# fs.file-max: System-wide maximum number of open file handles.
# Default is typically ~100K.  Wave needs headroom for:
#   - Lucene index segments (grows with document count)
#   - Jetty WebSocket connections (one FD per connected client)
#   - MongoDB driver connections
#   - Log files, JVM internal FDs
# 2 million provides ample room for 100K+ concurrent users.
fs.file-max = 2097152

# fs.nr_open: Per-process ceiling on open file descriptors.
# Must be >= the hard nofile limit in limits.conf.prod (262144).
# Setting to 1M ensures we never hit a per-process cap before the
# system-wide limit.
fs.nr_open = 1048576

# ---------------------------------------------------------------------------
# Virtual Memory
# ---------------------------------------------------------------------------
# vm.swappiness: How aggressively the kernel swaps anonymous pages to disk.
#   0   = never swap (dangerous; OOM killer fires immediately)
#   10  = swap only under significant memory pressure (recommended for Java)
#   60  = default (too aggressive; causes unnecessary I/O for JVM workloads)
#   100 = swap eagerly
#
# With 94 GiB RAM and 32 GiB swap (per Phase 1.3), swappiness=10 means the
# kernel will strongly prefer reclaiming page cache before touching swap,
# but swap acts as an emergency buffer against OOM kills.
vm.swappiness = 10

# vm.dirty_bytes / vm.dirty_background_bytes: Absolute byte limits for
# dirty pages.  On large-RAM hosts, percentage-based ratios (dirty_ratio,
# dirty_background_ratio) produce unreasonably large dirty page budgets.
# For a 94 GiB host, 15% = ~14 GiB of dirty data before forced flush,
# which can cause massive I/O storms.
#
# Using absolute byte values gives predictable behavior regardless of
# total RAM:
#   dirty_bytes           = 256 MiB : Force synchronous flush at 256 MiB dirty.
#   dirty_background_bytes = 64 MiB : Background flusher kicks in at 64 MiB.
#
# These values keep I/O smooth for MongoDB + Lucene merge workloads.
# NOTE: Setting dirty_bytes disables dirty_ratio (and vice versa).
vm.dirty_bytes = 268435456
vm.dirty_background_bytes = 67108864

# ---------------------------------------------------------------------------
# Networking - TCP Tuning
# ---------------------------------------------------------------------------
# net.core.somaxconn: Maximum length of the listen backlog queue.
# Jetty and Caddy both benefit from a large backlog during traffic spikes.
# Default is 4096 on modern kernels; 65535 handles burst arrivals without
# dropping SYN packets.
net.core.somaxconn = 65535

# net.ipv4.tcp_max_syn_backlog: Maximum number of remembered connection
# requests that have not yet been acknowledged.  Protects against SYN flood
# conditions during legitimate traffic spikes.
net.ipv4.tcp_max_syn_backlog = 65535

# net.ipv4.ip_local_port_range: Range of ephemeral ports for outbound
# connections.  Default is 32768-60999 (~28K ports).
# We keep the default lower bound (32768) to avoid conflicts with service
# listen ports (Wave 9898/9899, MongoDB 27017, Caddy 80/443, etc.).
# If you need more outbound ports, lower the start value but also set
# net.ipv4.ip_local_reserved_ports to exclude all listener ports.
net.ipv4.ip_local_port_range = 32768 65535

# net.ipv4.tcp_tw_reuse: Allow reuse of TIME_WAIT sockets for new
# connections when the protocol considers it safe.
#   0 = disabled
#   1 = enabled for all outbound connections
#   2 = enabled for loopback only (safer, available on Linux 4.6+)
#
# Value 2 is preferred: Wave's outbound connections to MongoDB and other
# local services go over loopback, where TIME_WAIT reuse is safe.
# External connections use the default behavior to avoid rare timestamp
# ordering issues behind NAT.
#
# NOTE: Value 2 (loopback-only) requires Linux kernel >= 4.6.  The
# supawave host runs a modern Ubuntu with kernel 5.x+, so this is safe.
# On older kernels, use 1 or 0 instead.
net.ipv4.tcp_tw_reuse = 2

# net.ipv4.tcp_syn_cookies: Protect against SYN flood attacks by using
# SYN cookies when the SYN backlog is full.  This allows the server to
# continue accepting legitimate connections during a flood without
# allocating resources for half-open connections.
net.ipv4.tcp_syn_cookies = 1

# net.core.netdev_max_backlog: Maximum number of packets queued on the INPUT
# side when the interface receives packets faster than the kernel can process.
# Default is 1000; 5000 prevents packet drops under bursty WebSocket traffic.
net.core.netdev_max_backlog = 5000

# ---------------------------------------------------------------------------
# TCP Buffer Sizes
# ---------------------------------------------------------------------------
# Increase default and maximum TCP buffer sizes for high-throughput WebSocket
# traffic.  Values: min, default, max (bytes).
#
# Default kernel values are often 4K / 87K / 6M.  Increasing the max to 16M
# allows individual connections to scale up when needed (large document sync),
# while the default of 256K keeps per-connection overhead reasonable.

# Receive buffers
net.ipv4.tcp_rmem = 4096 262144 16777216

# Send buffers
net.ipv4.tcp_wmem = 4096 262144 16777216

# net.core.rmem_max / wmem_max: Global caps on socket buffer sizes.
# Must be >= the max values in tcp_rmem / tcp_wmem above.
net.core.rmem_max = 16777216
net.core.wmem_max = 16777216

# ---------------------------------------------------------------------------
# Transparent Huge Pages (THP) - MongoDB Warning
# ---------------------------------------------------------------------------
# MongoDB recommends disabling THP, which causes latency spikes during
# page compaction.  THP is NOT controlled via sysctl; disable it with:
#
#   echo never > /sys/kernel/mm/transparent_hugepage/enabled
#   echo never > /sys/kernel/mm/transparent_hugepage/defrag
#
# To persist across reboots, add a systemd unit or init script.
# See: https://www.mongodb.com/docs/manual/tutorial/transparent-huge-pages/
