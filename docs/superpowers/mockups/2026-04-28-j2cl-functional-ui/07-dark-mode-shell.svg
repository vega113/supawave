    <text x="66" y="387" text-anchor="middle" font-size="11" font-weight="700" fill="#0b1320">Unread only</text>
    <rect x="118" y="370" width="106" height="26" rx="13" fill="transparent" stroke="rgba(34,211,238,0.18)"/>
