    <!-- Card 5 -->
    <g transform="translate(16,552)">
      <rect width="416" height="92" rx="12" fill="#0b1320" stroke="rgba(34,211,238,0.18)"/>
      <circle cx="30" cy="30" r="14" fill="#7c3aed"/>
