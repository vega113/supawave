<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="920" viewBox="0 0 1600 920" role="img" aria-labelledby="title desc">
  <title id="title">Desktop current vs proposed nested reply layout</title>
  <desc id="desc">Side-by-side desktop mockup showing the current crushed nested inline layout and the proposed focused-thread layout.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f6fbff"/>
      <stop offset="100%" stop-color="#edf6ff"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0b3558" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect width="1600" height="920" fill="#dfeef9"/>
  <text x="800" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" font-weight="700" fill="#103b5f">
    Desktop: current vs proposed deep reply handling
  </text>

  <g transform="translate(28,88)">
    <rect width="756" height="796" rx="24" fill="url(#bg)" stroke="#b7d4ea" filter="url(#shadow)"/>
    <text x="28" y="42" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#154567">Current</text>
    <text x="28" y="74" font-family="Arial, sans-serif" font-size="17" fill="#456b87">All ancestors remain inline, so the active branch loses width at every level.</text>

    <rect x="24" y="106" width="214" height="656" rx="18" fill="#ffffff" stroke="#c6ddec"/>
    <rect x="24" y="106" width="214" height="48" rx="18" fill="#2f8fd4"/>
    <text x="44" y="138" font-family="Arial, sans-serif" font-size="19" font-weight="700" fill="#ffffff">Inbox</text>
    <g font-family="Arial, sans-serif" font-size="16" fill="#285370">
      <rect x="38" y="176" width="184" height="62" rx="12" fill="#e8f3fb"/>
      <text x="56" y="210">Bitcoin thread</text>
      <rect x="38" y="252" width="184" height="62" rx="12" fill="#ffffff" stroke="#d4e4f0"/>
      <text x="56" y="286">Other wave</text>
      <rect x="38" y="328" width="184" height="62" rx="12" fill="#ffffff" stroke="#d4e4f0"/>
      <text x="56" y="362">Notes</text>
    </g>

    <rect x="258" y="106" width="474" height="656" rx="18" fill="#ffffff" stroke="#c6ddec"/>
    <rect x="258" y="106" width="474" height="48" rx="18" fill="#d8ebfb"/>
    <text x="280" y="138" font-family="Arial, sans-serif" font-size="19" font-weight="700" fill="#1a5478">Wave: Bitcoin discussion</text>

    <g stroke="#d7e8f4" stroke-width="1" fill="none">
      <line x1="338" y1="154" x2="338" y2="742"/>
      <line x1="414" y1="154" x2="414" y2="742"/>
      <line x1="490" y1="154" x2="490" y2="742"/>
      <line x1="566" y1="154" x2="566" y2="742"/>
    </g>

    <g font-family="Arial, sans-serif">
      <rect x="286" y="184" width="402" height="98" rx="16" fill="#f6fbff" stroke="#d4e6f1"/>
      <text x="308" y="216" font-size="16" font-weight="700" fill="#1a5579">Root blip</text>
      <text x="308" y="246" font-size="15" fill="#2f607d">The chart earlier said 73k, but this chart reaches 67.5k.</text>

      <rect x="354" y="304" width="334" height="106" rx="16" fill="#fbfdff" stroke="#d9e9f3"/>
      <text x="376" y="336" font-size="15" font-weight="700" fill="#1a5579">Reply depth 1</text>
      <text x="376" y="366" font-size="14" fill="#2f607d">Can you share the exact time range?</text>

      <rect x="422" y="432" width="266" height="114" rx="16" fill="#fbfdff" stroke="#dfeef6"/>
      <text x="444" y="464" font-size="15" font-weight="700" fill="#1a5579">Reply depth 2</text>
      <text x="444" y="494" font-size="14" fill="#2f607d">Maybe the current price and the chart point differ.</text>

      <rect x="490" y="566" width="198" height="126" rx="16" fill="#ffffff" stroke="#c9e3f5" stroke-width="2"/>
      <text x="512" y="598" font-size="15" font-weight="700" fill="#1a5579">Reply depth 3</text>
      <text x="512" y="628" font-size="14" fill="#2f607d">Active branch is now too narrow.</text>
      <rect x="512" y="646" width="152" height="26" rx="10" fill="#eef7ff"/>
      <text x="524" y="664" font-size="12" fill="#2b6788">Editor feels cramped</text>
    </g>

    <rect x="286" y="708" width="402" height="36" rx="12" fill="#d4ebfb"/>
    <text x="308" y="731" font-family="Arial, sans-serif" font-size="15" fill="#1a5478">Most of the width is hierarchy, not content.</text>
  </g>

  <g transform="translate(816,88)">
    <rect width="756" height="796" rx="24" fill="url(#bg)" stroke="#b7d4ea" filter="url(#shadow)"/>
    <text x="28" y="42" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#154567">Proposed</text>
    <text x="28" y="74" font-family="Arial, sans-serif" font-size="17" fill="#456b87">Shallow levels stay inline. Deep/narrow branches switch to focused-thread mode.</text>

    <rect x="24" y="106" width="214" height="656" rx="18" fill="#ffffff" stroke="#c6ddec"/>
    <rect x="24" y="106" width="214" height="48" rx="18" fill="#2f8fd4"/>
    <text x="44" y="138" font-family="Arial, sans-serif" font-size="19" font-weight="700" fill="#ffffff">Inbox</text>

    <rect x="258" y="106" width="474" height="656" rx="18" fill="#ffffff" stroke="#c6ddec"/>
    <rect x="258" y="106" width="474" height="48" rx="18" fill="#d8ebfb"/>
    <text x="280" y="138" font-family="Arial, sans-serif" font-size="19" font-weight="700" fill="#1a5478">Wave: Bitcoin discussion</text>

    <g font-family="Arial, sans-serif">
      <rect x="282" y="178" width="426" height="42" rx="16" fill="#0a78ba"/>
      <text x="304" y="204" font-size="15" font-weight="700" fill="#ffffff">Wave  ›  Root blip  ›  Reply depth 1  ›  Reply depth 2</text>

      <rect x="286" y="240" width="402" height="98" rx="16" fill="#f6fbff" stroke="#d4e6f1"/>
      <text x="308" y="272" font-size="16" font-weight="700" fill="#1a5579">Root blip</text>
      <text x="308" y="302" font-size="15" fill="#2f607d">The chart earlier said 73k, but this chart reaches 67.5k.</text>

      <rect x="354" y="360" width="334" height="106" rx="16" fill="#fbfdff" stroke="#d9e9f3"/>
      <text x="376" y="392" font-size="15" font-weight="700" fill="#1a5579">Reply depth 1</text>
      <text x="376" y="422" font-size="14" fill="#2f607d">Can you share the exact time range?</text>

      <rect x="422" y="488" width="266" height="114" rx="16" fill="#fbfdff" stroke="#dfeef6"/>
      <text x="444" y="520" font-size="15" font-weight="700" fill="#1a5579">Reply depth 2</text>
      <text x="444" y="550" font-size="14" fill="#2f607d">Maybe the current price and the chart point differ.</text>

      <rect x="306" y="620" width="382" height="110" rx="18" fill="#ffffff" stroke="#1292d0" stroke-width="3"/>
      <text x="330" y="652" font-size="16" font-weight="700" fill="#0f628c">Focused thread branch</text>
      <text x="330" y="682" font-size="15" fill="#2f607d">Depth 3 no longer loses width to visible ancestors.</text>
      <rect x="330" y="694" width="188" height="24" rx="10" fill="#dff3ff"/>
      <text x="342" y="710" font-size="12" fill="#0f628c">Full-width editor and message card</text>
    </g>

    <path d="M694 676 C712 676, 718 676, 730 676" fill="none" stroke="#0f8bc8" stroke-width="4" stroke-linecap="round"/>
    <polygon points="728,668 742,676 728,684" fill="#0f8bc8"/>
    <text x="472" y="744" font-family="Arial, sans-serif" font-size="15" fill="#1a5478">Ancestors stay in breadcrumb context.</text>
  </g>
</svg>
