//=============================================================================
// CheckStyle Config
//=============================================================================
checkstyle {
    toolVersion = "7.6.1"
    configFile = file("/google_checks.xml")
}

checkstyleMain.source = "src/main/java" // only checks the manually written java

//=============================================================================
// Protobuf Config
//=============================================================================
protobuf {
    protoc {
        artifact = 'com.google.protobuf:protoc:3.21.12'
    }
    generatedFilesBaseDir = "$projectDir/generated"
}

//=============================================================================
// Task - Generation Tasks (External Compilers)
//=============================================================================

task verifyPstCodegen {
    description = 'Verifies PST code generation produced Java sources.'
    dependsOn 'generateMessages'
    doLast {
        File outDir = file('generated/main/java')
        if (!outDir.exists()) {
            throw new GradleException("PST codegen output directory not found: ${outDir}")
        }
        def javaFiles = fileTree(dir: outDir, include: '**/*.java')
        if (javaFiles.isEmpty()) {
            throw new GradleException("No generated Java sources found under ${outDir}")
        }
        println "verifyPstCodegen: Found ${javaFiles.files.size()} generated Java source files"
    }
}

// Ensure verification runs with the standard checks
tasks.named('check') {
    dependsOn(verifyPstCodegen)
}

tasks.named('test') {
    // Ensure PST codegen verification runs before unit tests that may assert generated sources
    dependsOn(verifyPstCodegen)
}

task generateMessages {
    description = 'Generates source files from Antlr String types and protobuf'
    FileTree inputFiles = fileTree(dir: 'generated/src/main/java', include: '**/*.java')
    inputs.files inputFiles
    File outputDir = file("generated/main/java")
    outputs.dir outputDir
    doLast {
        List<String> proto_classes = [
                "build/classes/java/proto/org/waveprotocol/box/common/comms/WaveClientRpc.class",
                "build/classes/java/proto/org/waveprotocol/box/search/SearchProto.class",
                "build/classes/java/proto/org/waveprotocol/box/profile/ProfilesProto.class",
                "build/classes/java/proto/org/waveprotocol/box/server/rpc/Rpc.class",
                "build/classes/java/proto/org/waveprotocol/box/attachment/AttachmentProto.class",
                "build/classes/java/proto/org/waveprotocol/wave/federation/Proto.class",
                "build/classes/java/proto/org/waveprotocol/wave/concurrencycontrol/ClientServer.class",
                "build/classes/java/proto/org/waveprotocol/wave/diff/Diff.class"
        ]
        List<String> templates = [
                "src/main/java/org/waveprotocol/pst/templates/api/api.st",
                "src/main/java/org/waveprotocol/pst/templates/builder/builder.st",
                "src/main/java/org/waveprotocol/pst/templates/pojo/pojo.st",
                "src/main/java/org/waveprotocol/pst/templates/jso/jso.st",
                "src/main/java/org/waveprotocol/pst/templates/util/util.st",
                "src/main/java/org/waveprotocol/pst/templates/gson/gson.st",
                "src/main/java/org/waveprotocol/pst/templates/proto/proto.st"
        ]
        proto_classes.each { proto ->
javaexec {
                mainClass = "org.apache.wave.pst.PstMain"
                classpath = configurations.generateMessages
                args = [
                        '-s',
                        'pst',
                        '-d',
                        'generated/main/java',
                        '-f',
                        proto
                ]
                args += templates
            }
        }
    }
}

generateMessages.dependsOn ":pst:shadowJar", "compileProtoJava"
// Ensure PST shadow jar is available before generating 'proto' sources for the 'proto' sourceSet
tasks.named('generateProtoProto') {
    dependsOn(":pst:shadowJar")
}
// Make implicit dependencies explicit to avoid Gradle 8 warnings
["extractProtoProto", "extractIncludeProto", "extractIncludeTestProto"].each { t ->
    tasks.matching { it.name == t }.configureEach {
        dependsOn(":pst:shadowJar")
        dependsOn(":pst:jar")
    }
}
["compileJava", "startScripts", "distZip", "distTar"].each { t ->
    tasks.matching { it.name == t }.configureEach {
        dependsOn(":pst:jar")
    }
}
// Aggregate GWT tasks for manual invocation
tasks.register("gwtBuild") {
    dependsOn("compileGwt", "compileGwtDemo", "compileGwtDev", "testGwt")
}

task generateGXP {
    description = 'Generate source files from GXP prototypes'
    FileTree inputFiles = fileTree(dir: 'src/main/gxp', include: '**/*.gxp')
    inputs.files inputFiles
    File outputDir = file("generated/main/java")
    outputs.dir outputDir
    doLast {
javaexec {
            mainClass = "com.google.gxp.compiler.cli.Gxpc"
            classpath += configurations.generateGXP
            args = [
                    "--dir",
                    "generated/main/java",
                    "--source",
                    "src/main/gxp",
                    "--output_language",
                    "java"
            ]
            args += fileTree(dir: 'src/main/gxp', include: '**/*.gxp').getFiles()
        }
    }
}

//=============================================================================
// Gwt Compilation Options
//=============================================================================
task compileGwt {
    description = 'Compiles the GWT sources for production'
    FileTree inputFiles = fileTree(dir: 'generated/src/main/java', include: '**/*.java')
    doLast {
        def launcher = javaToolchains.launcherFor { languageVersion = JavaLanguageVersion.of(17) }
        javaexec {
            executable = launcher.get().executablePath.asFile.absolutePath
            mainClass = "com.google.gwt.dev.Compiler"
            classpath = files(sourceSets.main.java.srcDirs) + configurations.gwt + sourceSets.main.compileClasspath + files(sourceSets.main.resources.srcDirs)
            jvmArgs = [
                    "-Xmx1024M"
            ]
            args = [
                    "-style", "OBFUSCATED",
                    "-XdisableClassMetadata",
                    "-XdisableCastChecking",
                    "-localWorkers", "4",
                    "org.waveprotocol.box.webclient.WebClientProd"
            ]
        }
    }
}

compileGwt.mustRunAfter compileJava

task compileGwtDemo {
    description = 'Compiles the GWT sources for Demo'
    doLast {
        def launcher = javaToolchains.launcherFor { languageVersion = JavaLanguageVersion.of(17) }
        javaexec {
            executable = launcher.get().executablePath.asFile.absolutePath
            mainClass = "com.google.gwt.dev.Compiler"
            classpath = files(sourceSets.main.java.srcDirs) + configurations.gwt + sourceSets.main.compileClasspath + files(sourceSets.main.resources.srcDirs)
            args = [
                    "-style", "Pretty",
                    "-ea",
                    "org.waveprotocol.box.webclient.WebClientDemo"
            ]
        }
    }
}

task compileGwtDev {
    description = 'Compiles the GWT sources for Development'
    doLast {
        def launcher = javaToolchains.launcherFor { languageVersion = JavaLanguageVersion.of(17) }
        javaexec {
            executable = launcher.get().executablePath.asFile.absolutePath
            mainClass = "com.google.gwt.dev.Compiler"
            classpath {
                [
                        sourceSets.main.java.srcDirs,
                        sourceSets.main.compileClasspath,
                        sourceSets.main.resources.srcDirs
                ]
            }
            args = [
                    "-style", "PRETTY",
                    "-draftCompile",
                    "-ea",
                    "-strict",
                    "org.waveprotocol.box.webclient.WebClientDev"
            ]
        }
    }
}


run.dependsOn compileGwt
compileJava.dependsOn = [generateMessages, generateGXP]

/* Gwt Dev Tasks */

task gwtDev {
    description = 'Runs the hosted mode server, for debugging the Gwt client ' +
            'in a JVM.'
    doFirst {
        println ''
        println '----------------------------------------------'
        println '           Running Gwt Dev mode.              '
        println 'Note: This currently has a classpath conflict.'
        println '----------------------------------------------'
        println ''
    }
    doLast {
        def launcher = javaToolchains.launcherFor { languageVersion = JavaLanguageVersion.of(17) }
        javaexec {
            executable = launcher.get().executablePath.asFile.absolutePath
            mainClass = "com.google.gwt.dev.DevMode"
            classpath = files(sourceSets.main.java.srcDirs) + configurations.gwt + sourceSets.main.compileClasspath + files(sourceSets.main.resources.srcDirs)
            args = [
                    "-noserver",
                    "-bindAddress", "127.0.0.1",
                    "-startupUrl", "http://localhost:9898",
                    "-logLevel", "DEBUG",
                    "org.waveprotocol.box.webclient.WebClientDev",
            ]
        }
    }
}

//=============================================================================
// Tests
//=============================================================================

test {
    include "**/*Test*"
    exclude "**/*GwtTest*"
    exclude "**/server/persistence/mongodb/**/*Test*"
    exclude "**/*LargeTest*"

    minHeapSize = "512m"
    maxHeapSize = "1024m"

    // Open modules for Mockito on JDK 17
    jvmArgs += [
        '--add-opens', 'java.base/java.lang=ALL-UNNAMED',
        '--add-opens', 'java.base/java.lang.reflect=ALL-UNNAMED',
        '--add-opens', 'java.base/java.util=ALL-UNNAMED'
    ]

    doFirst {
        println ''
        println '---------------------'
        println ' Running unit tests. '
        println '---------------------'
        println ''
    }
}

task testGwt(type: Test) {
    include "**/*GwtTest*"

    // Use explicit test outputs and runtime classpath (avoids Gradle 9 deprecation)
    testClassesDirs = sourceSets.test.output.classesDirs
    classpath = sourceSets.test.runtimeClasspath

    minHeapSize = "512m"
    maxHeapSize = "1024m"
    forkEvery = 1

    jvmArgs '-Dgwt.args=-logLevel WARN'

    doFirst {
        println ''
        println '--------------------'
        println ' Running Gwt tests. '
        println '--------------------'
        println ''
    }
}

testGwt.dependsOn compileGwt

// Dedicated task to run GWT JUnit tests with GWT tooling on the JVM classpath
// This avoids polluting the default test task's classpath with gwt-dev/jetty.
 task testGwtHosted(type: Test) {
     include "**/*GwtTest*"

     // Use explicit test outputs and runtime classpath and augment with GWT tooling
     testClassesDirs = sourceSets.test.output.classesDirs
     classpath = sourceSets.test.runtimeClasspath + configurations.gwt

     // Run GWT JUnitShell under Java 11 for better compatibility (Jetty/ASM)
     def j11 = javaToolchains.launcherFor { languageVersion = JavaLanguageVersion.of(11) }
     javaLauncher = j11

     minHeapSize = "512m"
     maxHeapSize = "1024m"
     forkEvery = 1

     // Pass through GWT arguments; append -runStyle HtmlUnit for headless
     jvmArgs '-Dgwt.args=-logLevel DEBUG -runStyle HtmlUnit'

     doFirst {
         println ''
         println '-----------------------------'
         println ' Running Gwt tests (hosted). '
         println '   (using Java ' + j11.get().metadata.languageVersion.asInt() + ' toolchain)'
         println '-----------------------------'
         println ''
     }
 }

task testMongo(type: Test) {
    include "**/server/persistence/mongodb/**/*Test*"

    doFirst {
        println ''
        println '--------------------------'
        println ' Testing MongoDB backend. '
        println '--------------------------'
        println ''
    }
}

testMongo.dependsOn compileJava

task testLarge(type: Test) {
    include "**/*LargeTest*"

    doFirst {
        println ''
        println '-------------------------------'
        println '     Testing Large Tests.      '
        println 'These tests may take some time.'
        println '-------------------------------'
        println ''
    }
}

testLarge.dependsOn compileJava

task testAll() {
    doFirst {
        println ''
        println '--------------------------'
        println '     Tests completed.     '
        println '--------------------------'
        println ''
    }
}

testAll.dependsOn compileJava, compileGwt
testAll.dependsOn test, testMongo, testLarge, testGwt

testGwt.mustRunAfter compileGwt, testLarge
testMongo.mustRunAfter compileJava, test
testLarge.mustRunAfter test

//=============================================================================
// Dist's
//=============================================================================

jar {
    archiveBaseName = 'wave'
    archiveClassifier = ''
    manifest {
        attributes "Specification-Vendor": vendor,
                "Specification-Title": title,
                "Specification-Version": version,
                "Implementation-Vendor": vendor,
                "Implementation-Title": title,
                "Implementation-Version": version,
                "Built-By": "No one in particular",
"Main-Class": "org.waveprotocol.box.server.ServerMain"
    }
    exclude "org/waveprotocol/box/webclient/**/*"
    exclude "org/waveprotocol/box/consoleclient/**/*"
    exclude "org/waveprotocol/box/expimp/**/*"
    exclude "org/waveprotocol/wave/client/*"
    exclude "org/waveprotocol/wave/client/account/**/*"
    exclude "org/waveprotocol/wave/client/autohide/**/*"
    exclude "org/waveprotocol/wave/client/clipboard/**/*"
    exclude "org/waveprotocol/wave/client/common/**/*"
    exclude "org/waveprotocol/wave/client/concurrencycontrol/**/*"
    exclude "org/waveprotocol/wave/client/debug/**/*"
    exclude "org/waveprotocol/wave/client/doodad/**/*"
    exclude "org/waveprotocol/wave/client/paging/**/*"
    exclude "org/waveprotocol/wave/client/render/**/*"
    exclude "org/waveprotocol/wave/client/scheduler/**/*"
    exclude "org/waveprotocol/wave/client/scroll/**/*"
    exclude "org/waveprotocol/wave/client/state/**/*"
    exclude "org/waveprotocol/wave/client/testing/**/*"
    exclude "org/waveprotocol/wave/client/uibuilder/**/*"
    exclude "org/waveprotocol/wave/client/uibuilder/**/*"
    exclude "org/waveprotocol/wave/client/util/**/*"
    exclude "org/waveprotocol/wave/client/wave/**/*"
    exclude "org/waveprotocol/wave/client/wavepanel/**/*"
    exclude "org/waveprotocol/wave/client/widget/**/*"
    exclude "com/google/api/client/**/*"
}
jar.dependsOn compileJava

//=============================================================================
// Binary Distribution
//=============================================================================
tasks.withType(Tar) {
    compression = Compression.BZIP2
}

distributions {
    main {
        contents {
            from('config') {
              into 'config'
            }
            from('war') {
                into 'war'
            }
            from('../THANKS') {
                into ''
            }
            from('../RELEASE-NOTES') {
                into ''
            }
            from('../KEYS') {
                into ''
            }
            from('../DISCLAIMER') {
                into ''
            }
        }
    }
}

// Additional Clean
clean {
    delete "war/WEB-INF"
