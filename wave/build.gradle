//=============================================================================
// Plugins
//=============================================================================
plugins {
    id 'java'
    id 'application'
    id "com.google.protobuf" version "0.9.4"
}
apply plugin: 'com.google.protobuf'
apply plugin: 'checkstyle'

// Avoid build failures on duplicate resources (e.g., images appearing in multiple locations)
// by excluding duplicates during resource processing.
import org.gradle.language.jvm.tasks.ProcessResources

tasks.withType(ProcessResources) {
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
}

//=============================================================================
// Project Level Settings
//=============================================================================
/* Meta Data Info */
def title = 'Apache Wave Server'
def vendor = 'The Apache Software Foundation'
version = "0.4.2"
ext {
    // Allow overriding from the command line: ./gradlew -PgwtVersion=2.12.2
    gwtVersion = findProperty('gwtVersion') ?: '2.10.0'
    // Allow overriding Jetty version for server via -PjettyVersion
    jettyVersion = findProperty('jettyVersion') ?: '9.4.54.v20240208'
}
application {
    mainClass = "org.waveprotocol.box.server.ServerMain"
    applicationDefaultJvmArgs = [
            "-Xmx1024M",
            "-Dorg.eclipse.jetty.LEVEL=DEBUG",
            "-Djava.util.logging.config.file=config/wiab-logging.conf",
            "-Djava.security.auth.login.config=config/jaas.config",
            "--add-opens=java.base/java.lang=ALL-UNNAMED",
            "--add-opens=java.base/java.lang.reflect=ALL-UNNAMED",
            "--add-opens=java.base/java.util=ALL-UNNAMED"
    ]
}
java {
    // Compile and target JDK 17 bytecode
    sourceCompatibility = JavaVersion.VERSION_17
    targetCompatibility = JavaVersion.VERSION_17
    toolchain {
        languageVersion = JavaLanguageVersion.of(17)
    }
}
compileJava {
    options.incremental = true
}

//=============================================================================
// Extra Configurations (used for separation of dependencies)
//=============================================================================
configurations {
    generateMessages
    generateGXP
    protoCompile
    gwt
}

//=============================================================================
// Source's
//=============================================================================
sourceSets {
    main {
        java {
            srcDirs = [
                    'src/main/java',
                    'generated/main/java',
                    'generated/proto/java'
            ]
        }
        resources {
            srcDir 'src/main/resources'
        }
    }
    proto {
        proto {
            srcDir 'src/proto/proto'
            include '**/*.protodevel'
        }
    }
    test {
        java {
            srcDir 'src/test/java'
        }
        resources {
            srcDir 'src/test/resources'
        }
    }
}

