core {
  # Dev default: bind to localhost:9898
  http_frontend_addresses = ["127.0.0.1:9898"]
  # leave http_websocket_public_address empty to default to the first frontend address
}

network {
  # Allow JS to read session cookie for WebSocket fallback auth in dev
  session_cookie_http_only = false
}

security {
  # Dev default: no SSL; use plain HTTP on the address above.
  enable_ssl = false
  # For enabling HTTPS in dev, uncomment the lines below and set an env var
  # WAVE_SSL_KEYSTORE_PASSWORD or keep the default 'changeme' used by the
  # generated dev keystore at config/dev-keystore.jks.
  # ssl_keystore_path = "config/dev-keystore.jks"
  # ssl_keystore_password = "changeme"
  # ssl_keystore_password = ${?WAVE_SSL_KEYSTORE_PASSWORD}

  # Persist browser-session JWT signing keys for local restart stability.
  jwt_signing_key_path = "config/wave-session-jwt.properties"
}

# Fragments (server)
# Single switch for server-side transport: off | http | stream | both
server.fragments.transport = "stream"

# Prefer storage-backed segment state to surface state hits/misses/partial in /speedz.
server.preferSegmentState = true
server.enableStorageSegmentState = true

# Enable basic fragments metrics (surfaced under /speedz?show=fragments)
wave.fragments.metrics.enabled = true
# Enable client-side applier stats (surfaced under /speedz?show=client-applier)
wave.clientApplierStats.enabled = true
wave.fragments.forceClientApplier = true

# Client flags (object form)
client.flags.defaults {
  fragmentFetchMode = "stream"
  enableDynamicRendering = true
  enableFragmentsApplier = true
  enableViewportStats = true
  enableFragmentFetchViewChannel = true
  enableFragmentFetchForceLayer = false
  enableQuasiDeletionUi = true
  quasiDeletionDwellMs = 5000
  fragmentsApplierMaxRanges = 3
  # Optionally mirror server-side forcing to the client flags JSON
  forceClientFragments = true
}
# Profiling (keeps /speedz enabled in dev)
core.enable_profiling = false

# Keep OT search (real-time search wavelets) off by default in local dev.
# Enable it manually when a local test specifically needs the OT bootstrap path.
search.ot_search_enabled = false
