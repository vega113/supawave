# Configuration for the Apache Wave server.


core {
  # Domain name of the Wave server.
  wave_server_domain : "local.net"

  # A comma separated list of address on which to listen for connections.
  # Each address is a comma separated host:port pair.
  http_frontend_addresses : ["localhost:9898"]

  # The public address - a comma separated host:port pair, i.e. example.com:80
  http_frontend_public_address : ""

  # An optional host:port address on which to listen for websocket connections.
  # Defaults to http_websocket_public_address.
  # If no value is set for http_websocket_public_address it defaults to the first address specified
  # by http_frontend_public_address.
  http_websocket_public_address : ""

  # An optional host:port address for which the client is told to attempt websocket connections.
  # If no value is set for http_websocket_presented_address it defaults to http_websocket_public_address.
  http_websocket_presented_address : ""

  # A comma separated list of webApp source directories
  resource_bases : ["./war"]

  # Settings for the different persistence stores. Currently supported: memory, file, mongodb.
  signer_info_store_type : file

  # The location where signer info certificate data is stored on disk. This should be changed.
  # Note: This is only used when using the file signer info store. It is ignored
  # for other data store types.
  signer_info_store_directory : _certificates

  # Currently supported attachment types: mongodb, disk
  attachment_store_type : disk

  # The location where attachments are stored on disk. This should be changed.
  # Note: This is only used when using the disk attachment store. It is ignored
  # for other data store types.
  attachment_store_directory : _attachments

  # Directory that holds the thumbnails for attachments.
  # Icon must be in PNG format, and named as MIME type with replacing '/' to '_'.
  # For example thumbnail file for ZIP format (MIME type application/zip) must be named application_zip.
  thumbnail_patterns_directory : _thumbnail_patterns

  # Currently supported contact store types: memory, mongodb
  contact_store_type : memory

  # Currently supported account store types: fake, memory, file, mongodb
  account_store_type : file

  # The location where accounts are stored on disk. This should be changed.
  # Note: This is only used when using the file account store. It is ignored
  # for other data store types.
  account_store_directory : _accounts

  # Currently supported delta store types: memory, file, mongodb.
  # Note: file system support is experimental. Your server may crash. And the file format is
  # not stable and shouldn't be relied upon for long-term storage yet; upcoming changes will
  # require you to blow away your data.
  delta_store_type : file

  # Number of deltas between automatic snapshot persistence.
  # 0 = disabled (full delta replay on every load, current behavior).
  # Recommended: 100-500 depending on wavelet activity patterns.
  snapshot_interval = 100

  # The location where deltas are stored on disk. This should be changed.
  # Note: This is only used when using the file delta store. It is ignored
  # for other data store types.
  delta_store_directory : _deltas

  # The location where user sessions are persisted on disk. This allow to restore user sessions
  # between restarts.
  sessions_store_directory : _sessions

  # Currently supported search types: memory, lucene, solr.
  search_type : memory

  # The location where search indexes are stored on disk.
  # Note: This is only used when using the lucene search type. It is ignored
  # for other search types.
  index_directory : _indexes
  legacy_index_directory : ${core.index_directory}/legacy-view
  lucene9_index_directory : ${core.index_directory}/lucene9
  # Set to true to force a full index rebuild on every server start.
  # Default false: reuse the existing index (kept current by incremental
  # updates) for faster startup and safe start-first rolling deploys.
  lucene9_rebuild_on_startup : false
  lucene9_vector_dimensions : 0
  lucene9_vector_similarity : "dot_product"

  # Currently supported profile fetcher types: gravatar, initials.
  # Use 'gravatar' to enable Gravatar avatars; requires explicit opt-in to avoid emitting third-party requests by default.
  profile_fetcher_type : gravatar

  # The Solr endpoint url.
  solr_base_url : "http://localhost:8983/solr"

  # Server version string exposed via the /version endpoint. Clients poll this
  # endpoint to detect server upgrades and prompt the user to reload.
  # Override via WAVE_SERVER_VERSION environment variable (e.g. a git SHA or
  # Docker image tag) in production deployments.
  server_version : "dev"
  server_version : ${?WAVE_SERVER_VERSION}

  # Enable inline snapshot pre-rendering (SSR Phase 5). When true, the server
  # pre-renders the user's most recent wave into the initial HTML page so
  # content is visible before GWT loads. GWT performs a "shell swap" to replace
  # the pre-rendered snapshot once fully initialized.
  # Default value: false (opt-in for safety)
  enable_prerendering : false

  # Enables server side profiling. To display the stats press ctrl+alt+ctrl in the web client.
  # Default value: true
  enable_profiling : true

  # Mongodb connection options
  # Only used if some of the *_store_type properties are set to 'mongodb'

  # Server's host name or IP address.
  mongodb_host : "127.0.0.1"

  # Server's port. Default value: 27017
  mongodb_port : 27017

  # Database's name. Default name: wiab
  mongodb_database : wiab

  # MongoDB credentials (optional).
  # When both are non-empty the connection URI becomes
  # mongodb://user:pass@host:port/db?authSource=admin.
  # Leave empty for unauthenticated connections (development only).
  # Can be overridden via environment variables MONGO_WAVE_USERNAME / MONGO_WAVE_PASSWORD.
  mongodb_username : ""
  mongodb_username : ${?MONGO_WAVE_USERNAME}

  mongodb_password : ""
  mongodb_password : ${?MONGO_WAVE_PASSWORD}

  # MongoDB Java driver to use for 'mongodb' store types: 'v2' (legacy) or 'v4' (new).
  # Note: the codebase already contains v4 implementations for signer info,
  # attachments, account stores, and delta stores. Switching this flag does not
  # by itself solve session or search topology on the active runtime.
  mongodb_driver : v2

  # Number of waves in memory cache.
  wave_cache_size = 1000

  # Duration to keep the waves in cache.
  wave_cache_expire = 60m

  # --- Email / Mail ---

  # Mail provider: "logging" (default, dev/no-op), "resend", or a fully-qualified class name.
  # Override via WAVE_MAIL_PROVIDER environment variable.
  mail_provider : "logging"
  mail_provider : ${?WAVE_MAIL_PROVIDER}

  # API key for the Resend mail provider. Only required when mail_provider = "resend".
  # Override via RESEND_API_KEY environment variable.
  resend_api_key : ""
  resend_api_key : ${?RESEND_API_KEY}

  # From address for outgoing emails
  email_from_address : "noreply@wave.example.test"
  email_from_address : ${?WAVE_EMAIL_FROM}

  # Public base URL used in robots output and auth-email links.
  public_url : ""
  public_url : ${?WAVE_PUBLIC_URL}

  # Email confirmation on registration. When true, new accounts are inactive
  # until the user clicks a confirmation link sent to their email.
  email_confirmation_enabled = false

  # Whether to require an email address during registration.
  # When true, users must provide an email to register.
  # When false (default), email is optional on the registration form.
  # Automatically treated as required when email_confirmation_enabled = true.
  email_required_for_registration = false
  email_required_for_registration = ${?WAVE_EMAIL_REQUIRED}

  # Password reset via email. When true, a "Forgot password?" link is shown
  # on the login page.
  password_reset_enabled = true

  # Magic link login. When true, a "Login with email" link is shown on the
  # login page, allowing passwordless login via a time-limited email link.
  magic_link_enabled = false

  # Support email shown on the Contact Us page (defaults to support@<domain>).
  support_email : ""
  support_email : ${?WAVE_SUPPORT_EMAIL}

  # Token expiry durations (seconds)
  magic_link_expiry_seconds = 600
  password_reset_expiry_seconds = 3600
  email_confirm_expiry_seconds = 86400

  # Best-effort throttling for activation and magic-link emails.
  auth_email_send_cooldown_seconds = 300
  auth_email_send_max_per_address_per_hour = 5
  auth_email_send_max_per_ip_per_hour = 20

  # Explicit owner address. When set and the account exists on startup, the
  # server ensures this user has the "owner" role. This is useful when the
  # auto-owner detection (first registered user) did not fire, e.g. because
  # the account was created before the feature was added.
  # Leave empty to rely solely on auto-owner detection at registration time.
  owner_address : ""
  owner_address : ${?WAVE_OWNER_ADDRESS}

}

network {
  # Max age of the Jetty HTTP session cookie (JSESSIONID) in seconds.
  # References security.session_expiry_seconds to ensure consistency between
  # JWT token lifetime and HTTP session cookie lifetime.
  # -1 means cookie lives in the browser current session only.
  # Override via WAVE_SESSION_COOKIE_MAX_AGE environment variable.
  session_cookie_max_age : ${security.session_expiry_seconds}
  session_cookie_max_age : ${?WAVE_SESSION_COOKIE_MAX_AGE}

  # Whether to mark the session cookie HttpOnly (recommended: true).
  # In development, the legacy web client may read JSESSIONID for WebSocket
  # fallback auth; override to false in application.conf if needed.
  session_cookie_http_only : true

  # The time in ms that the websocket connection can be idle before closing
  websocket_max_idle_time : 0

  # Maximum websocket message size to be received in MB
  websocket_max_message_size : 2
}

experimental {
  # (removed) native_servlet_registration
  # (removed) enable_programmatic_poc
}


administration {
  # Note: the default value for admin is an invalid user id that cannot be registered.
  # To become an admin: Register a user and set its address as the value below.
  # Admin user address. Password management is handled via email-based reset.
  admin_user : "@"

  # The wave id of the welcome template wave. (Without domain, for example: w+Fxjs_-ZPmmA).
  # If filled in then a copy of this wave (actually only the root blip) will be
  # automatically added to the inbox of every new user.
  welcome_wave_id : ""

  # Set true to prevent anyone registering on your server.
  # When true, only the admin user can use the RegistrationRobot to add new accounts
  disable_registration : false

  # Disable login page  - useful to force x509-only authentication
  disable_loginpage : false

  # Google Analytics account.
  analytics_account : ""
}

threads {
  # The number of threads to listen on wavelet updates. Default value: 1
  listener_executor_thread_count : 1

  # The number of threads for loading wavelets. Default value: 1
  wavelet_load_executor_thread_count : 1

  # The number of threads to persist deltas. Default value: 1
  delta_persist_executor_thread_count : 1

  # The number of threads to perform post wavelet loading logic. Default value: 1
  storage_continuation_executor_thread_count : 1

  # The number of threads for looking up the wavelet ids
  # while creating a list of all wavelets in the persistent storage. Default value: 1
  lookup_executor_thread_count : 1

  # The number of threads for making search/update requests to Solr. Default value: 1
  solr_thread_count : 1

  # The number of threads for making for retrieving contacts.
  contact_executor_thread_count : 1
}

security {
  # Enable SSL for all address/port combinations listed (makes the next 2 settings non-optional).
  enable_ssl : false

  # Path to keystore containg the ssl certificates to server
  # Note: this is only used when enable_ssl set to true.
  ssl_keystore_path : wiab.ks

  # Password to the keystore.
  # Note: this is only used when enable_ssl set to true.
  ssl_keystore_password : changeme

  # Enable client x509 cert. authentication?
  enable_clientauth : false

  # Domain of the email to look for as email field of x509 client auth certificates when using client authentication
  clientauth_cert_domain : ""

  # Path to the persisted browser-session JWT signing key ring. This file must
  # live on shared storage in multi-node or restart-sensitive deployments.
  jwt_signing_key_path : wave-session-jwt.properties

  # Browser session expiry in seconds. Controls both the JWT token lifetime
  # and the session cookie Max-Age. Default is 14 days (1209600 seconds).
  # Override via WAVE_SESSION_EXPIRY_SECONDS environment variable.
  session_expiry_seconds : 1209600
  session_expiry_seconds : ${?WAVE_SESSION_EXPIRY_SECONDS}
}

# Please note that currently Wave in a Box server has no Federation implementation.
federation {
  # Federation Configuration for the Wave in a Box server
  enable_federation : false

  # The PKCS#8-PEM-encoded private key.
  certificate_private_key : "local.net.key"

  # The list of file names that have the certificates of this signer.
  # The first file name must have the signer's target certificate. The  certificates can be DER or PEM encoded.
  # The order of certificates is important. Place intermediate certs
  # after "${wave_server_domain}.crt". Please refer to
  # http://www.waveprotocol.org/federation/certificates
  # for more details.
  certificate_files : ["local.net.crt","sub.class1.server.ca.pem","ca.pem"]

  # The domain for which the certificate was issued.
  certificate_domain : "local.net"

  # Set true to disable the verification of signed deltas
  waveserver_disable_verification : true

  # Set true to disable the verification of signers (certificates)
  waveserver_disable_signer_verification : true
}
# WebSocket client tuning (used by internal client channels)
wave.websocket {
  # Connect timeout for underlying Jetty WebSocketClient (ms)
  connectTimeoutMs = 10000
  # Max wait for connect future per attempt (ms)
  connectWaitMs = 15000
  # Exponential backoff cap between attempts (ms)
  maxBackoffMs = 8000
  # Jitter fraction applied to backoff sleeps (0.0 – 1.0). 0.2 = ±20%
  jitterFraction = 0.2
}

## Client Flags (defaults merged into the client at runtime)

# Preferred form: set typed defaults under client.flags.defaults.<flagName>.
# The legacy CSV form (client.flags.defaults = "a=true,b=123") is still
# accepted for backward compatibility but should be avoided.

client.flags.defaults {
  # Enable the client-side RawFragmentsApplier (records fragment windows and posts stats)
  # Values: true | false (default)
  enableFragmentsApplier = false

  # Fragment fetch mode used by the client renderer.
  # Values: "stream" (default, canonical) | "http" (metrics-only) | "off"
  # Stream mode delivers fragments via the ViewChannel WebSocket and is the
  # canonical transport path.  HTTP mode fires GET /fragments for metrics and
  # health-check purposes but does not parse/apply the response payload on the
  # client.  See docs/fragments-config.md for the design decision.
  fragmentFetchMode = "stream"

  # Allow the ViewChannel stream path for fragment delivery.
  # Deprecated: when fragmentFetchMode = "stream" (the default), the stream
  # requester activates unconditionally and this flag is ignored.  The flag is
  # retained only for backward compatibility with older configs that set it
  # explicitly.  Setting it to false has no effect in stream mode.
  enableFragmentFetchViewChannel = true

  # Force ViewChannel fragment requester even when the channel is not yet open.
  # Values: true | false (default).  Use for dev/testing only.
  enableFragmentFetchForceLayer = false

  # Enable dynamic rendering (incremental viewport paging)
  # Values: true | false (default)
  enableDynamicRendering = false

  # Enable quasi-deletion UI (soft-delete affordances)
  # Values: true | false (default)
  enableQuasiDeletionUi = false

  # Quasi-deletion dwell time / undo grace period before permanent deletion (milliseconds)
  quasiDeletionDwellMs = 5000

  # Enable slide navigation for deeply nested inline reply threads.
  # When true, depth tracking and CSS depth clamping are active.
  # Values: true (default) | false
  enableSlideNavigation = true

  # Maximum inline reply nesting depth. Replies beyond this depth are
  # promoted to the parent level with a note. 0 = unlimited.
  maxReplyDepth = 5
}

# Server-side reply depth limit enforcement. Mirrors the client-side
# maxReplyDepth flag but is checked on the server to prevent modified
# clients from bypassing the depth limit.
# 0 = unlimited (no server enforcement).
server.maxReplyDepth = 5

# Fragments configuration
wave.fragments {
  # Optional warning threshold (ms) for fragments applier duration
  applier {
    warnMs = 50
  }

  # Viewport hint tuning for fragments emission
  defaultViewportLimit = 5  # default number of blip segments when hint lacks/invalid
  maxViewportLimit = 50     # upper clamp for requested viewport_limit

  # Manifest order cache (server-side) to reduce recomputation on hot wavelets
  manifestOrderCache {
    maxEntries = 1024   # LRU size bound
    ttlMs = 120000      # TTL in milliseconds (0 disables TTL)
  }
}

## Fragments Transport (Server)

# Unified transport for server-side fragments features (single source of truth).
# Values: stream (default, canonical) | http | both | off
# Stream mode delivers fragments over the ViewChannel WebSocket.
# HTTP mode keeps the /fragments servlet active for metrics/diagnostics.
# See docs/fragments-config.md "Canonical Fragment Transport Path".
server.fragments.transport = stream

# Prefer (experimental) segment state storage over compat reconstruction when
# computing fragment ranges.
# - false (default): Ranges computed from snapshot-only heuristics (compat).
# - true: If a SegmentWaveletState exists for the wavelet, filter ranges to
#   known segments from that state. If state is missing, compat is used.
server.preferSegmentState = false

# When true, builds a storage-backed SegmentWaveletState from the current snapshot
# and caches it in the registry for reuse (scaffold). Future versions can wire a
# persistent backend.
server.enableStorageSegmentState = false

# Size bound for the in-memory SegmentWaveletStateRegistry (entries; LRU eviction).
# Increase in small increments if using an in-memory state provider. Has no
# effect if you replace the registry with a persistent backend.
server.segmentStateRegistry.maxEntries = 1024

# TTL for in-memory SegmentWaveletStateRegistry entries. 0 disables TTL expiration.
server.segmentStateRegistry.ttlMs = 300000

# Minimal fragments metrics (server JVM). Values: true | false (default)
wave.fragments.metrics.enabled = false

# Optional warning threshold (ms) for fragments applier duration (server JVM)
wave.fragments.applier.warnMs = 50

# Server-side applier implementation for observability/testing.
# Values: "noop" (default) | "skeleton" | "real"
wave.fragments.applier.impl = "noop"

## OT Search (Real-Time Search Wavelets)
# When enabled, the server maintains per-user search wavelets that receive
# real-time delta updates when underlying waves change, replacing the 15-second
# polling mechanism. Disabled by default until Phase 4 (client integration)
# is complete.
search.ot_search_enabled = false
# Controls the synchronous startup warmup in ServerMain that pre-builds either
# the owner wave view or the entire wave map. Default false because eager
# warmup can block startup on a full wave scan; leaving it off preserves the
# existing lazy first-search behavior.
search.startup_wave_view_warmup = false
search.ot_search_public_batching_enabled = true
search.ot_search_public_batch_ms = 15000
search.ot_search_public_fanout_threshold = 25
search.ot_search_high_participant_threshold = 25

analytics {
  # Maximum time budget (ms) for a full analytics refresh scan.
  refresh_budget_ms = 30000
}
