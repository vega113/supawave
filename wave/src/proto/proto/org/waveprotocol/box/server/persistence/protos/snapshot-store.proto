// Persistence envelope for periodic wavelet snapshots.

syntax = "proto2";

import "org/waveprotocol/box/common/comms/waveclient-rpc.proto";

package protodeltastore;

option java_package = "org.waveprotocol.box.server.persistence.protos";
option java_outer_classname = "ProtoSnapshotStoreData";

// Envelope for a persisted wavelet snapshot.  Wraps the existing
// WaveletSnapshot (which contains only wavelet_id) with the wave_id
// needed for deserialization.
message PersistedWaveletSnapshot {
  required string wave_id = 1;
  required waveserver.WaveletSnapshot snapshot = 2;
}
